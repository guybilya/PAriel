<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>מערכת ניהול מחסן - מלכים</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- Stub functions — מוגדרות מיד כדי שה-onclick יעבוד לפני טעינת ה-module -->
<script>
  window._loginTab = 'id';
  // _setLoginTab defined below
  // _login defined below
  window._logout = function() {};
  window._nav = function() {};
</script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword, updateEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  // ==========================================
  // 🔥 הגדר כאן את פרטי ה-Firebase שלך!
  // ==========================================
  // 1. לך ל: https://console.firebase.google.com
  // 2. צור פרויקט חדש
  // 3. הוסף Web App
  // 4. הפעל Authentication > Email/Password
  // 5. הפעל Realtime Database
  // 6. העתק את הפרטים לכאן:
  const firebaseConfig = {
    apiKey: "AIzaSyD6fG2R9bjRq4PygvAwI3wgbQe2JViUzcQ",
    authDomain: "ariel-e997b.firebaseapp.com",
    databaseURL: "https://ariel-e997b-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ariel-e997b",
    storageBucket: "ariel-e997b.firebasestorage.app",
    messagingSenderId: "21505786554",
    appId: "1:21505786554:web:f3334072367f936251b883",
    measurementId: "G-RB7JSSWEKQ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // ── Seed demo data if empty ──────────────────────────────────
  async function seedIfEmpty() {
    // No demo data — system starts empty
  }

  // ── AUTH ──────────────────────────────────────────────────────
  let currentUser = null;
  let currentRole = null;
  let currentSoldierId = null;

  function dbg(msg) {
    const el = document.getElementById('debugLog');
    if (el) el.textContent = msg;
    console.log('[AUTH]', msg);
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      dbg('משתמש זוהה: ' + user.email + ' | טוען נתונים...');
      const snap = await get(ref(db, 'users/' + user.uid));
      if (snap.exists()) {
        const data = snap.val();
        currentUser = { ...data, uid: user.uid };
        currentRole = data.role;
        currentSoldierId = data.soldierId || null;
        // Set correct starting page BEFORE showApp
        activePage = (currentRole === 'soldier') ? 'my_gear' : 'warehouse_a';
        dbg('נכנס בהצלחה! עובר למערכת... role=' + currentRole);
        showApp();
        loadCurrentPage();
      } else {
        dbg('שגיאה: משתמש לא נמצא ב-Database (uid: ' + user.uid + ')');
        showLogin();
      }
    } else {
      dbg('');
      showLogin();
    }
  });

  window._loginTab = 'id'; // 'id' or 'email'
  window._setLoginTab = function(tab) {
    window._loginTab = tab;
    const idRow = document.getElementById('loginIdRow');
    const emailRow = document.getElementById('loginEmailRow');
    const tabId = document.getElementById('loginTabId');
    const tabEmail = document.getElementById('loginTabEmail');
    if (tab === 'id') {
      if (idRow) idRow.style.display = 'block';
      if (emailRow) emailRow.style.display = 'none';
      if (tabId) { tabId.style.background = '#1a73e8'; tabId.style.color = 'white'; }
      if (tabEmail) { tabEmail.style.background = 'transparent'; tabEmail.style.color = '#8a97a8'; }
    } else {
      if (idRow) idRow.style.display = 'none';
      if (emailRow) emailRow.style.display = 'block';
      if (tabEmail) { tabEmail.style.background = '#1a73e8'; tabEmail.style.color = 'white'; }
      if (tabId) { tabId.style.background = 'transparent'; tabId.style.color = '#8a97a8'; }
    }
  };

  window._login = async function() {
    const pass = document.getElementById('loginPassword').value.trim();
    const err = document.getElementById('loginError');
    err.textContent = '';
    if (!pass) { err.textContent = 'נא להזין סיסמה'; return; }

    // Email login
    if (window._loginTab === 'email') {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) { err.textContent = 'נא להזין אימייל'; return; }
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        return;
      } catch(e) {
        err.textContent = 'שגיאה: אימייל או סיסמה שגויים';
        return;
      }
    }

    // Personal ID login — lookup email in soldiers table
    const personalId = document.getElementById('loginPersonalId').value.trim();
    if (!personalId) { err.textContent = 'נא להזין מספר אישי'; return; }

    try {
      const solSnap = await get(ref(db, 'soldiers'));
      if (solSnap.exists()) {
        const soldiers = solSnap.val();
        const match = Object.values(soldiers).find(s => String(s.id) === String(personalId));
        if (match && match.email) {
          await signInWithEmailAndPassword(auth, match.email, pass);
          return;
        }
      }
    } catch(e) {}

    // Fallback: try personalId@malachim.mil
    try {
      await signInWithEmailAndPassword(auth, personalId + '@malachim.mil', pass);
      return;
    } catch(e) {}

    err.textContent = 'שגיאה: מספר אישי או סיסמה שגויים';
    dbg('כישלון התחברות — מספר אישי לא נמצא');
  };

  window._logout = async function() {
    await signOut(auth);
  };

  // ── PAGES ─────────────────────────────────────────────────────
  let activePage = 'warehouse_a';

  function showApp() {
    const ls = document.getElementById('loginScreen');
    const as = document.getElementById('appShell');
    if (ls) { ls.style.display = 'none'; ls.style.visibility = 'hidden'; ls.setAttribute('hidden', ''); }
    if (as) { as.removeAttribute('hidden'); as.style.visibility = 'visible'; as.style.display = 'flex'; }
    try { document.getElementById('hudUser').textContent = ''; } catch(e) {}
    // Date
    (function() {
      const now = new Date();
      const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
      const monthsHe = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
      const he = 'יום ' + days[now.getDay()] + ' ' + now.getDate() + ' ' + monthsHe[now.getMonth()] + ' ' + now.getFullYear();
      const lat = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
      const hed = document.getElementById('headerDateHe');
      const latd = document.getElementById('headerDateLat');
      if (hed) hed.textContent = he;
      if (latd) latd.textContent = lat;
    })();
    // Update sidebar profile
    const spn = document.getElementById('sideProfileName');
    if (spn) spn.textContent = currentUser?.name || '';
    // Show reset buttons for rasp
    ['resetBtn','resetBtnSide'].forEach(id => {
      const el = document.getElementById(id);
      if (el && currentRole === 'rasp') el.classList.remove('hidden');
    });
    // activePage already set in auth handler
    updateNav();
  }
  function showLogin() {
    const ls = document.getElementById('loginScreen');
    const as = document.getElementById('appShell');
    if (ls) { ls.removeAttribute('hidden'); ls.style.visibility = 'visible'; ls.style.display = 'flex'; }
    if (as) { as.style.display = 'none'; as.style.visibility = 'hidden'; as.setAttribute('hidden', ''); }
  }

  function updateNav() {
    const isSoldier = currentRole === 'soldier';

    // Bottom nav visibility
    const raspNav = document.getElementById('raspNav');
    const soldierNav = document.getElementById('soldierNav');
    if (raspNav) raspNav.style.display = isSoldier ? 'none' : 'flex';
    if (soldierNav) soldierNav.style.display = isSoldier ? 'flex' : 'none';

    // Active state on bottom nav items
    document.querySelectorAll('.bnav-item[data-nav]').forEach(el => {
      const isActive = el.dataset.nav === activePage;
      el.classList.toggle('nav-active', isActive);
    });

    // Active state on sidebar nav links  
    document.querySelectorAll('.nav-link[data-nav]').forEach(el => {
      const isActive = el.dataset.nav === activePage;
      el.classList.toggle('text-primary', isActive);
    });
  }

  window._nav = function(page) {
    activePage = page;
    updateNav();
    loadCurrentPage();
    document.getElementById('mainContent').scrollTop = 0;
  };

  function loadCurrentPage() {
    const content = document.getElementById('mainContent');
    if (currentRole === 'soldier') {
      switch(activePage) {
        case 'my_gear': renderMyGear(); return;
        case 'warehouse_a': case 'warehouse_b': case 'warehouse_donations':
        case 'register': case 'history': case 'soldiers': case 'requests': case 'armory':
          // soldier trying to access rasp pages - redirect
          activePage = 'my_gear'; updateNav(); renderMyGear(); return;
        case 'my_history': renderMyHistory(); return;
        case 'my_requests': renderMyRequests(); return;
        default: renderMyGear(); return;
      }
    }
    switch(activePage) {
      case 'warehouse_a': renderWarehouse('warehouse_a', 'מחסן א׳', 'inventory_2'); break;
      case 'warehouse_b': renderWarehouse('warehouse_b', 'מחסן ב׳', 'warehouse'); break;
      case 'warehouse_donations': renderWarehouse('warehouse_donations', 'מחסן תרומות', 'volunteer_activism'); break;
      case 'armory': renderArmory(); break;
      case 'register': renderRegister(); break;
      case 'armory': renderArmory(); break;
      case 'history': renderHistory(); break;
      case 'soldiers': if(currentRole === 'rasp') renderSoldiers(); else _nav('my_gear'); break;
      case 'requests': renderRequests(); break;
      case 'my_gear': renderMyGear(); break;
    }
  }

  // ── WAREHOUSE ─────────────────────────────────────────────────
  function renderWarehouse(whKey, title, icon) {
    const content = document.getElementById('mainContent');
    content.innerHTML = `<div class="p-6 space-y-6">
      <div class="flex flex-col md:flex-row justify-between items-end gap-4">
        <div>
          <span class="font-label text-xs text-primary uppercase tracking-widest block">מבצעי לוגיסטיקה</span>
          <h2 class="font-headline text-4xl font-extrabold tracking-tighter">${title}</h2>
        </div>
        <div class="flex gap-3 flex-wrap">
          <div class="relative">
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm">search</span>
            <input id="searchBox" class="bg-surface-container-low border-b border-outline-variant focus:border-primary focus:ring-0 text-sm py-2 pr-10 pl-4 w-64 transition-all" placeholder="חיפוש לפי מק״ט או שם פריט..." oninput="window._filterTable()" type="text"/>
          </div>
          ${currentRole === 'rasp' ? `<button onclick="window._openAddItem('${whKey}')" class="bg-surface-container-highest text-primary font-label text-xs font-bold px-4 py-2.5 rounded-sm hover:bg-surface-variant border border-primary/10 flex items-center gap-2"><span class="material-symbols-outlined text-sm">add</span> פריט חדש</button>` : ''}
          <button onclick="window._exportCSV('${whKey}')" class="bg-surface-container-highest text-primary font-label text-xs font-bold px-4 py-2.5 rounded-sm hover:bg-surface-variant border border-primary/10 flex items-center gap-2"><span class="material-symbols-outlined text-sm">sim_card_download</span> ייצוא CSV</button>
        </div>
      </div>
      <div id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
      <div class="bg-surface-container rounded-sm overflow-hidden border border-white/5">
        <div class="overflow-x-auto">
          <table class="w-full text-right border-collapse">
            <thead class="bg-surface-container-high sticky top-0 z-10">
              <tr>
                <th class="px-3 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase w-14">תמונה</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">מק"ט</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">תיאור</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">תקינה</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">בלאי</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">מנופק</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">סה"כ</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">נדרש</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">חוסר</th>
                <th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">סטטוס</th>
                ${currentRole === 'rasp' ? '<th class="px-4 py-4 font-label text-[11px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">פעולות</th>' : ''}
              </tr>
            </thead>
            <tbody id="inventoryTableBody" class="divide-y divide-white/5"></tbody>
          </table>
        </div>
        <div class="px-6 py-3 bg-surface-container-high flex justify-between items-center border-t border-white/10">
          <span id="tableCount" class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest">טוען...</span>
        </div>
      </div>
    </div>`;

    window._currentWarehouse = whKey;
    onValue(ref(db, 'inventory/' + whKey), (snap) => {
      const data = snap.val() || {};
      window._warehouseData = data;
      renderInventoryTable(data);
      renderStats(data);
    });
  }

  function renderStats(data) {
    const items = Object.values(data);
    const total = items.length;
    const critical = items.filter(i => i.status === 'קריטי').length;
    const wear = items.reduce((s,i) => s + (i.wear||0), 0);
    const issued = items.reduce((s,i) => s + (i.issued||0), 0);
    const grid = document.getElementById('statsGrid');
    if (!grid) return;
    const totalShortage = items.reduce((s,i) => {
      const tot = (i.good||0)+(i.wear||0)+(i.issued||0);
      return s + (i.required ? Math.max(0, i.required - tot) : 0);
    }, 0);
    grid.innerHTML = `
      <div class="bg-surface-container-low p-4 rounded-sm border-r-2 border-primary">
        <span class="font-label text-[10px] text-on-surface-variant block mb-1">סה"כ מק"טים</span>
        <div class="text-2xl font-headline font-bold">${total}</div>
      </div>
      <div class="bg-surface-container-low p-4 rounded-sm border-r-2 border-error">
        <span class="font-label text-[10px] text-on-surface-variant block mb-1">מק"טים קריטיים</span>
        <div class="text-2xl font-headline font-bold text-error">${critical}</div>
      </div>
      <div class="bg-surface-container-low p-4 rounded-sm border-r-2 border-tertiary">
        <span class="font-label text-[10px] text-on-surface-variant block mb-1">סה"כ חוסרים</span>
        <div class="text-2xl font-headline font-bold text-tertiary">${totalShortage || '—'}</div>
      </div>
      <div class="bg-surface-container-low p-4 rounded-sm border-r-2 border-secondary">
        <span class="font-label text-[10px] text-on-surface-variant block mb-1">נופק</span>
        <div class="text-2xl font-headline font-bold text-secondary">${issued}</div>
      </div>`;
  }

  window._filterTable = function() {
    const q = document.getElementById('searchBox')?.value.toLowerCase() || '';
    if (!window._warehouseData) return;
    const filtered = {};
    Object.entries(window._warehouseData).forEach(([k,v]) => {
      if (k.toLowerCase().includes(q) || v.name.toLowerCase().includes(q)) filtered[k] = v;
    });
    renderInventoryTable(filtered, true);
  };

  function calcStatus(item) {
    const total = (item.good||0) + (item.wear||0) + (item.issued||0);
    const required = item.required || 0;
    if (!required) return { status: item.status || 'תקין', shortage: 0, pct: 100 };
    const shortage = Math.max(0, required - total);
    const pct = required > 0 ? Math.round((total / required) * 100) : 100;
    let status = 'תקין';
    if (pct < 40) status = 'קריטי';
    else if (pct < 70) status = 'בינוני';
    return { status, shortage, pct };
  }

  function statusBadge(s) {
    if (s === 'תקין') return `<span class="bg-primary/10 text-primary px-2 py-1 text-[10px] font-bold rounded-sm border border-primary/20">תקין</span>`;
    if (s === 'קריטי') return `<span class="bg-error/10 text-error px-2 py-1 text-[10px] font-bold rounded-sm border border-error/20">קריטי</span>`;
    return `<span class="bg-tertiary/10 text-tertiary px-2 py-1 text-[10px] font-bold rounded-sm border border-tertiary/20">בינוני</span>`;
  }

  function renderInventoryTable(data, filtered=false) {
    const tbody = document.getElementById('inventoryTableBody');
    const count = document.getElementById('tableCount');
    if (!tbody) return;
    const entries = Object.entries(data);
    tbody.innerHTML = entries.map(([sku, item]) => {
      const total = (item.good||0) + (item.wear||0) + (item.issued||0);
      const { status, shortage, pct } = calcStatus(item);
      const shortageCell = shortage > 0
        ? `<td class="px-4 py-4"><span class="inline-flex items-center gap-1 bg-error/10 text-error px-2 py-1 text-[10px] font-bold rounded-sm border border-error/20"><span class="material-symbols-outlined text-xs">arrow_downward</span>${shortage}</span></td>`
        : `<td class="px-4 py-4"><span class="text-on-surface-variant/40 text-xs font-label">—</span></td>`;
      const requiredCell = item.required
        ? `<td class="px-4 py-4 text-on-surface-variant font-medium">${item.required}</td>`
        : `<td class="px-4 py-4"><span class="text-on-surface-variant/40 text-xs font-label">—</span></td>`;
      return `
      <tr class="hover:bg-white/5 transition-colors group">
        <td class="px-3 py-3">
          <div class="w-10 h-10 rounded-lg overflow-hidden bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shrink-0">
            ${item.photo ? `<img src="${item.photo}" class="w-full h-full object-cover"/>` : `<span class="material-symbols-outlined text-on-surface-variant/30 text-lg">image</span>`}
          </div>
        </td>
        <td class="px-4 py-4 font-mono text-xs text-primary">#${sku}</td>
        <td class="px-4 py-4"><button onclick="window._openItemDrawer('${sku}','${window._currentWarehouse}')" class="font-medium text-sm text-right hover:text-primary hover:underline transition-colors cursor-pointer">${item.name}</button></td>
        <td class="px-4 py-4 font-medium text-emerald-700">${item.good||0}</td>
        <td class="px-4 py-4 text-amber-600">${item.wear||0}</td>
        <td class="px-4 py-4 text-on-surface-variant">${item.issued||0}</td>
        <td class="px-4 py-4 font-bold">${total}</td>
        ${requiredCell}
        ${shortageCell}
        <td class="px-4 py-4">${statusBadge(status)}</td>
        ${currentRole === 'rasp' ? `<td class="px-4 py-4 flex gap-2">
          <button onclick="window._openEditItem('${window._currentWarehouse}','${sku}')" class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors">edit_note</button>
          <button onclick="window._deleteItem('${window._currentWarehouse}','${sku}')" class="material-symbols-outlined text-on-surface-variant hover:text-error transition-colors">delete</button>
        </td>` : ''}
      </tr>`;
    }).join('');
    if (count) count.textContent = `מציג ${entries.length} רשומות`;
  }

  // ── CRUD MODALS ───────────────────────────────────────────────
  window._openAddItem = function(whKey) {
    showModal('הוספת פריט חדש', `
        <div class="flex gap-3 items-center p-3 bg-slate-50 rounded-xl border border-slate-200 mb-4">
          <div id="addPhotoPreview" onclick="document.getElementById('m_photo').click()"
            class="w-14 h-14 rounded-xl overflow-hidden bg-white border-2 border-dashed border-slate-300 flex items-center justify-center cursor-pointer hover:border-primary transition-colors shrink-0">
            <span class="material-symbols-outlined text-slate-300 text-2xl">add_photo_alternate</span>
          </div>
          <input id="m_photo" type="file" accept="image/*" class="hidden" onchange="window._previewItemPhoto('m_photo','addPhotoPreview')"/>
          <div><p class="text-sm font-semibold text-slate-600">תמונת פריט</p><p class="text-xs text-slate-400">לחץ להעלאה</p></div>
        </div>
        <div class="space-y-3">
          <div><label class="field-lbl">מק"ט</label><input id="m_sku" class="field-inp" placeholder='לדוגמה: 820-09-122' type="text"/></div>
          <div><label class="field-lbl">שם פריט</label><input id="m_name" class="field-inp" placeholder="שם הפריט" type="text"/></div>
          <div><label class="field-lbl">כמות נדרשת <span class="text-slate-400 font-normal">(100% — לפיה יחושב הסטטוס)</span></label><input id="m_required" class="field-inp" type="number" value="0"/></div>
          <div class="grid grid-cols-3 gap-2">
            <div><label class="field-lbl">תקינה</label><input id="m_good" class="field-inp text-center" type="number" value="0"/></div>
            <div><label class="field-lbl">בלאי</label><input id="m_wear" class="field-inp text-center" type="number" value="0"/></div>
            <div><label class="field-lbl">מנופק</label><input id="m_issued" class="field-inp text-center" type="number" value="0"/></div>
          </div>
        </div>`,
    `<button onclick="closeModal()" class="btn-cancel">ביטול</button>
     <button onclick="window._saveNewItem('${whKey}')" class="btn-save">שמור</button>`);
  };

  window._saveNewItem = async function(whKey) {

    window._regCond = cond;

    if (!gBtn || !wBtn) return;
    if (cond === 'good') {
      gBtn.className = 'flex-1 py-3 border-2 border-primary/40 bg-primary/10 text-primary font-label text-xs font-bold rounded-sm transition-all flex items-center justify-center gap-2';
      wBtn.className = 'flex-1 py-3 border border-outline-variant/30 text-on-surface-variant font-label text-xs font-bold rounded-sm transition-all flex items-center justify-center gap-2';
    } else {
      wBtn.className = 'flex-1 py-3 border-2 border-tertiary/40 bg-tertiary/10 text-tertiary font-label text-xs font-bold rounded-sm transition-all flex items-center justify-center gap-2';
      gBtn.className = 'flex-1 py-3 border border-outline-variant/30 text-on-surface-variant font-label text-xs font-bold rounded-sm transition-all flex items-center justify-center gap-2';
    }
  };

  window._setRegType = function(type) {
    window._regType = type;
    // Reset all buttons
    ['regTypeIssue','regTypeReturn','regTypeTransfer'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.className = btn.className
        .replace(/border-2/g,'border')
        .replace(/border-primary\/40/g,'border-outline-variant/30')
        .replace(/border-secondary\/40/g,'border-outline-variant/30')
        .replace(/border-tertiary\/40/g,'border-outline-variant/30');
      const h = btn.querySelector('.font-headline');
      const ic = btn.querySelector('.material-symbols-outlined');
      if (h) { h.classList.remove('text-primary','text-secondary','text-tertiary'); h.classList.add('text-on-surface-variant'); }
      if (ic) { ic.classList.remove('text-primary','text-secondary','text-tertiary'); ic.classList.add('text-on-surface-variant'); }
    });
    // Activate selected
    const colors = { issue:'primary', return:'secondary', transfer:'tertiary' };
    const activeBtn = document.getElementById(type === 'issue' ? 'regTypeIssue' : type === 'return' ? 'regTypeReturn' : 'regTypeTransfer');
    const col = colors[type] || 'primary';
    if (activeBtn) {
      activeBtn.classList.remove('border','border-outline-variant/30');
      activeBtn.classList.add('border-2', 'border-' + col + '/40');
      const h = activeBtn.querySelector('.font-headline');
      const ic = activeBtn.querySelector('.material-symbols-outlined');
      if (h) { h.classList.remove('text-on-surface-variant'); h.classList.add('text-' + col); }
      if (ic) { ic.classList.remove('text-on-surface-variant'); ic.classList.add('text-' + col); }
    }
    // Show/hide transfer fields
    const soldierRow = document.getElementById('reg_soldier_row');
    const condRow = document.getElementById('condGood')?.closest('div')?.parentElement;
    const whToRow = document.getElementById('reg_wh_to_row');
    const whFromLabel = document.getElementById('reg_wh_from_label');
    if (type === 'transfer') {
      if (soldierRow) soldierRow.classList.add('hidden');
      if (whToRow) whToRow.classList.remove('hidden');
      if (whFromLabel) whFromLabel.textContent = 'מחסן מקור';
    } else {
      if (soldierRow) soldierRow.classList.remove('hidden');
      if (whToRow) whToRow.classList.add('hidden');
      if (whFromLabel) whFromLabel.textContent = 'מחסן';
    }
  };

        <span class="font-label text-[10px] px-2 py-1 bg-${typeColor[op.type]||'secondary'}/10 text-${typeColor[op.type]||'secondary'} border border-${typeColor[op.type]||'secondary'}/20 rounded-sm">${op.type}</span>

  window._submitRegister = async function() {
    const soldierSid = document.getElementById('reg_soldier')?.value;
    const sku = document.getElementById('reg_sku')?.value;
    const qty = parseInt(document.getElementById('reg_qty')?.value)||1;
    const cond = window._regCond || 'good';
    const regType = window._regType || 'issue';
    const whFrom = document.getElementById('reg_wh_from')?.value || 'warehouse_a';
    const whTo = document.getElementById('reg_wh_to')?.value || 'warehouse_b';

    if (!sku) { showToast('נא לבחור פריט', true); return; }

    // ── TRANSFER between warehouses ──
    if (regType === 'transfer') {
      if (whFrom === whTo) { showToast('מחסן מקור ויעד זהים!', true); return; }
      const snapFrom = await get(ref(db, 'inventory/' + whFrom + '/' + sku));
      const fromItem = snapFrom.val();
      if (!fromItem) { showToast('הפריט לא קיים במחסן המקור', true); return; }
      const availFrom = cond === 'good' ? (fromItem.good||0) : (fromItem.wear||0);
      if (qty > availFrom) { showToast('אין מספיק פריטים במחסן המקור! זמין: ' + availFrom, true); return; }
      // Deduct from source
      if (cond === 'good') await update(ref(db, 'inventory/' + whFrom + '/' + sku), { good: availFrom - qty });
      else await update(ref(db, 'inventory/' + whFrom + '/' + sku), { wear: availFrom - qty });
      // Add to dest (create if not exists)
      const snapTo = await get(ref(db, 'inventory/' + whTo + '/' + sku));
      if (snapTo.exists()) {
        const toItem = snapTo.val();
        if (cond === 'good') await update(ref(db, 'inventory/' + whTo + '/' + sku), { good: (toItem.good||0) + qty });
        else await update(ref(db, 'inventory/' + whTo + '/' + sku), { wear: (toItem.wear||0) + qty });
      } else {
        // copy item to new warehouse
        const newItem = { ...fromItem, good: cond==='good'?qty:0, wear: cond==='wear'?qty:0, issued: 0 };
        await set(ref(db, 'inventory/' + whTo + '/' + sku), newItem);
      }
      const whNames = { warehouse_a:'מחסן א׳', warehouse_b:'מחסן ב׳', warehouse_donations:'מחסן תרומות' };
      await _logActivity('העברה', fromItem.name, sku, currentUser?.name||'', whNames[whFrom] + ' → ' + whNames[whTo]);
      showToast('העברה בוצעה בהצלחה ✓');
      document.getElementById('reg_sku').value = '';
      document.getElementById('reg_qty').value = '1';
      document.getElementById('stockInfo').classList.add('hidden');
      renderRecentOps();
      return;
    }

    // ── ISSUE / RETURN ──
    const type = regType === 'issue' ? 'ניפוק' : 'זיכוי';
    const item = window._allItemsFlat?.[sku];
    const wh = document.getElementById('reg_wh_from')?.value || window._warehouseByItem?.[sku] || 'warehouse_a';
    if (!item) { showToast('פריט לא נמצא במלאי', true); return; }

    const snap = await get(ref(db, 'inventory/' + wh + '/' + sku));
    const current = snap.val() || {};
    if (type === 'ניפוק') {
      if (cond === 'good') {
        const avail = current.good || 0;
        if (qty > avail) { showToast('אין מספיק פריטים תקינים! זמין: ' + avail, true); return; }
        await update(ref(db, 'inventory/' + wh + '/' + sku), { good: avail - qty, issued: (current.issued||0) + qty });
      } else {
        const avail = current.wear || 0;
        if (qty > avail) { showToast('אין מספיק פריטים בלאי! זמין: ' + avail, true); return; }
        await update(ref(db, 'inventory/' + wh + '/' + sku), { wear: avail - qty, issued: (current.issued||0) + qty });
      }
      if (soldierSid) {
        const solSnap = await get(ref(db, 'soldiers/' + soldierSid));
        const sol = solSnap.val() || {};
        const items = sol.items || [];
        if (!items.includes(sku)) items.push(sku);
        await update(ref(db, 'soldiers/' + soldierSid), { items });
      }
    } else {
      if (cond === 'good') {
        await update(ref(db, 'inventory/' + wh + '/' + sku), { good: (current.good||0) + qty, issued: Math.max(0,(current.issued||0) - qty) });
      } else {
        await update(ref(db, 'inventory/' + wh + '/' + sku), { wear: (current.wear||0) + qty, issued: Math.max(0,(current.issued||0) - qty) });
      }
      if (soldierSid) {
        const solSnap = await get(ref(db, 'soldiers/' + soldierSid));
        const sol = solSnap.val() || {};
        const items = (sol.items || []).filter(i => i !== sku);
        await update(ref(db, 'soldiers/' + soldierSid), { items });
      }
    }

    const soldierName = soldierSid ? (await get(ref(db, 'soldiers/' + soldierSid + '/name'))).val() || 'לא ידוע' : currentUser?.name || 'לא ידוע';
    const condLabel = cond === 'good' ? 'תקין' : 'בלאי';
    await _logActivity(type, item.name, sku, soldierName, condLabel);
    showToast(type + ' בוצע בהצלחה ✓');
    const soldierEl = document.getElementById('reg_soldier');
    if (soldierEl) soldierEl.value = '';
    document.getElementById('reg_sku').value = '';
    document.getElementById('reg_qty').value = '1';
    document.getElementById('stockInfo').classList.add('hidden');
    renderRecentOps();
  };

    const newEmail = document.getElementById('s_email_e')?.value.trim() || '';
    const newPass = document.getElementById('s_pass_e')?.value || '';

    const updateData = {
      name: document.getElementById('s_name_e').value,
      id: document.getElementById('s_id_e').value,
      phone: document.getElementById('s_phone_e').value,
      role: document.getElementById('s_role_e').value,
      status: document.getElementById('s_status_e').value,
      email: newEmail,
      items
    };
    if (photoBase64) updateData.photo = photoBase64;

    // Update DB
    await update(ref(db, 'soldiers/' + sid), updateData);

    // Update Firebase Auth if email/password changed
    // Find the user's uid from the users table
    const usersSnap = await get(ref(db, 'users'));
    if (usersSnap.exists()) {
      const uid = Object.entries(usersSnap.val()).find(([, u]) => u.soldierId === sid)?.[0];
      if (uid) {
        await update(ref(db, 'users/' + uid), { name: updateData.name, role: updateData.role });
        // Auth updates — use admin SDK not available in client, so we update password via current session if it's the logged-in user
        if (uid === auth.currentUser?.uid) {
          try {
            if (newEmail && newEmail !== auth.currentUser.email) {
              await updateEmail(auth.currentUser, newEmail);
            }
            if (newPass) {
              await updatePassword(auth.currentUser, newPass);
            }
          } catch(e) {
            showToast('הפרטים עודכנו אך לא ניתן לשנות אימייל/סיסמה — נסה להתנתק ולהתחבר מחדש', true);
            closeModal(); return;
          }
        } else if (newEmail || newPass) {
          // For other users — store pending change note
          showToast('פרטי החייל עודכנו. שינוי אימייל/סיסמה יכנס לתוקף בכניסה הבאה של החייל.', false);
          closeModal(); return;
        }
      }
    }

    closeModal();
    showToast('חייל עודכן ✓');
  };

  window._submitRequest = async function() {
    const text = document.getElementById('req_text').value.trim();
    if (!text) { showToast('נא לרשום תיאור', true); return; }
    if (text.length > 40) { showToast('הבקשה ארוכה מדי (מקסימום 40 תווים)', true); return; }
    const now = new Date();
    const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')} | ${now.getDate()}/${now.getMonth()+1}`;
    await push(ref(db, 'requests'), {
      soldierName: currentUser?.name || '',
      soldierId: currentUser?.id || '',
      text, time, status: 'open', uid: currentUser?.uid
    });
    closeModal();
    showToast('הבקשה נשלחה ✓');
  };

  window._doneRequest = async function(rid) {

  window._armoryRenderTable = function(filterCat) {
    const tbody = document.getElementById('armoryTableBody');

    if (!tbody) return;
    const data = window._armoryData || {};
    const allSoldiers = window._soldiersData || {};

    // Build flat list of all items
    const rows = [];
    Object.entries(data).forEach(([cat, items]) => {
      if (filterCat !== 'all' && filterCat !== cat) return;
      Object.entries(items || {}).forEach(([itemId, item]) => {
        if (!item.name || item.name === 'undefined') return;
        rows.push({ cat, itemId, ...item });
      });
    });

    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-on-surface-variant text-sm">אין פריטים</td></tr>';
      if (countEl) countEl.textContent = '0 פריטים';

    const catLabel = (cat) => ARMORY_CATS[cat]?.label || cat;

    tbody.innerHTML = rows.map(row => {

      const holderInfo = isIssued

        : '<span class="bg-tertiary/10 text-tertiary px-2 py-0.5 text-[10px] font-bold rounded-sm border border-tertiary/20">בלאי</span>';

            : '<button data-cat="' + row.cat + '" data-item="' + row.itemId + '" onclick="window._armoryAssign(this.dataset.cat,this.dataset.item)" class="font-label text-[10px] px-2 py-1 rounded-sm border border-primary/20 text-primary hover:bg-primary/10 transition-all uppercase tracking-wider">שייך</button>')
          + '<button data-cat="' + row.cat + '" data-item="' + row.itemId + '" onclick="window._armoryDelete(this.dataset.cat,this.dataset.item)" class="material-symbols-outlined text-on-surface-variant/40 hover:text-error transition-colors text-sm">delete</button>'
          + '</div>'
        : '';

      return '<tr class="hover:bg-white/5 transition-colors group">'

  window._armoryUnassign = async function(cat, itemId) {
    if (!confirm('לשחרר פריט זה מהחייל?')) return;
    const snap = await get(ref(db, 'armory/' + cat + '/' + itemId));
    const item = snap.val();
    if (!item) return;
    // Remove from soldier's items
    if (item.holderId) {
      const sSnap = await get(ref(db, 'soldiers/' + item.holderId));
      if (sSnap.exists()) {
        const sol = sSnap.val();
        const newItems = (sol.items || []).filter(i => i !== cat + '_' + itemId);
        await update(ref(db, 'soldiers/' + item.holderId), { items: newItems });
      }
    }
    await update(ref(db, 'armory/' + cat + '/' + itemId), { holderId: null, holderName: null });
    await _logActivity('זיכוי', item.name || itemId, itemId, item.holderName || '', ARMORY_CATS[cat]?.label || cat);
    showToast('פריט שוחרר ✓');
    const freshSnap = await get(ref(db, 'armory'));
    if (freshSnap.exists()) {
      window._armoryData = freshSnap.val();
      _armoryDrawStats(window._armoryData);
      _armoryTab(cat);
    }
  };

  window._armoryConfirmIssue = async function(cat) {
    const sid = document.getElementById('aIssueSol').value;
    const good = parseInt(document.getElementById('aIssueGood').value)||0;
    const wear = parseInt(document.getElementById('aIssueWear').value)||0;
    if (!sid || (good+wear === 0)) { showToast('נא לבחור חייל וכמות', true); return; }
    const solSnap = await get(ref(db,'soldiers/'+sid));
    const s = solSnap.val();
    const catSnap = await get(ref(db,'armory/'+cat));
    const catData = catSnap.val() || {};
    // Find a "virtual" aggregate item or create one per category
    const aggKey = cat + '_stock';
    const aggSnap = await get(ref(db,'armory/'+cat+'/'+aggKey));
    const agg = aggSnap.exists() ? aggSnap.val() : { name: ARMORY_CATS[cat].label, good:0, wear:0, issued:0, holderId:null, holderName:null };
    // Check stock
    if (good > (agg.good||0)) { showToast('אין מספיק תקינה! זמין: '+(agg.good||0), true); return; }
    if (wear > (agg.wear||0)) { showToast('אין מספיק בלאי! זמין: '+(agg.wear||0), true); return; }
    await update(ref(db,'armory/'+cat+'/'+aggKey), {
      good: (agg.good||0)-good,
      wear: (agg.wear||0)-wear,
      issued: (agg.issued||0)+good+wear
    });
    await _logActivity('ניפוק', ARMORY_CATS[cat].label, cat, s.name, ARMORY_CATS[cat].label);
    closeModal(); showToast('ניפוק בוצע ✓');
  };

    const solSnap = await get(ref(db, 'soldiers'));
    const soldiers = solSnap.val() || {};

  window._armoryConfirmReturn = async function(cat) {
    const sid = document.getElementById('aRetSol').value;
    const good = parseInt(document.getElementById('aRetGood').value)||0;
    const wear = parseInt(document.getElementById('aRetWear').value)||0;
    if (!sid || (good+wear === 0)) { showToast('נא לבחור חייל וכמות', true); return; }
    const solSnap = await get(ref(db,'soldiers/'+sid));
    const s = solSnap.val();
    const aggKey = cat + '_stock';
    const aggSnap = await get(ref(db,'armory/'+cat+'/'+aggKey));
    const agg = aggSnap.exists() ? aggSnap.val() : { name: ARMORY_CATS[cat].label, good:0, wear:0, issued:0 };
    await update(ref(db,'armory/'+cat+'/'+aggKey), {
      good: (agg.good||0)+good,
      wear: (agg.wear||0)+wear,
      issued: Math.max(0,(agg.issued||0)-(good+wear))
    });
    await _logActivity('זיכוי', ARMORY_CATS[cat].label, cat, s.name, ARMORY_CATS[cat].label);
    closeModal(); showToast('זיכוי בוצע ✓');
  };

  window._armoryAssign = async function(cat, itemId) {
    // Load soldiers for picker
    const solSnap = await get(ref(db, 'soldiers'));
    const soldiers = solSnap.val() || {};
    const opts = Object.entries(soldiers)
      .map(([sid, s]) => `<option value="${sid}">${s.name} (${s.id})</option>`)
      .join('');
    showModal('שיוך חייל לפריט', `
      <div class="space-y-3">
        <div class="p-3 bg-slate-50 rounded-xl border border-slate-200">
          <p class="text-xs text-slate-500 mb-0.5">פריט</p>
          <p class="font-semibold text-slate-800">${window._armoryData?.[cat]?.[itemId]?.name} — ${itemId}</p>
        </div>
        <div>
          <label class="field-lbl">בחר חייל</label>
          <select id="armoryPickSoldier" class="field-inp">${opts}</select>
        </div>
      </div>`,
      `<button onclick="closeModal()" class="btn-cancel">ביטול</button>
       <button onclick="window._armoryConfirmAssign('${cat}','${itemId}')" class="btn-save">שייך</button>`
    );

  window._armoryConfirmAssign = async function(cat, itemId) {
    const sid = document.getElementById('armoryPickSoldier').value;
    if (!sid) return;
    const solSnap = await get(ref(db, 'soldiers/' + sid));
    const s = solSnap.val();
    // Update armory item
    await update(ref(db, 'armory/' + cat + '/' + itemId), { holderId: sid, holderName: s.name });
    // Add to soldier's items list so it shows in "הציוד שלי"
    const armoryKey = cat + '_' + itemId;
    const solItems = s.items || [];
    if (!solItems.includes(armoryKey)) {
      await update(ref(db, 'soldiers/' + sid), { items: [...solItems, armoryKey] });
    }
    await _logActivity('ניפוק', window._armoryData?.[cat]?.[itemId]?.name || itemId, itemId, s.name, ARMORY_CATS[cat]?.label || cat);
    closeModal();
    showToast('שויך בהצלחה ✓');
    // Refresh
    const freshSnap = await get(ref(db, 'armory'));
    if (freshSnap.exists()) {
      window._armoryData = freshSnap.val();
      _armoryDrawStats(window._armoryData);
      _armoryTab(cat);
    }
  };

  window._armoryDelete = async function(cat, itemId) {
    if (!confirm('למחוק פריט זה לגמרי?')) return;
    const snap = await get(ref(db, 'armory/' + cat + '/' + itemId));
    const item = snap.val();
    // Remove from soldier if assigned
    if (item?.holderId) {
      const sSnap = await get(ref(db, 'soldiers/' + item.holderId));
      if (sSnap.exists()) {
        const sol = sSnap.val();
        await update(ref(db, 'soldiers/' + item.holderId), { items: (sol.items||[]).filter(i => i !== cat+'_'+itemId) });
      }
    }
    await remove(ref(db, 'armory/' + cat + '/' + itemId));
    showToast('פריט נמחק ✓');
    const freshSnap = await get(ref(db, 'armory'));
    window._armoryData = freshSnap.val() || {};
    _armoryDrawStats(window._armoryData);
    _armoryRenderTable(window._activeArmoryTab);
  };

  window._armoryRelease = async function(cat, itemId) {
    const item = window._armoryData?.[cat]?.[itemId];
    if (!item) return;
    if (!confirm('לשחרר פריט זה מהחייל?')) return;
    // Remove from soldier items
    if (item.holderId) {
      const sSnap = await get(ref(db, 'soldiers/' + item.holderId));
      if (sSnap.exists()) {
        const sol = sSnap.val();
        const armoryKey = cat + '_' + itemId;
        await update(ref(db, 'soldiers/' + item.holderId), { items: (sol.items||[]).filter(i => i !== armoryKey) });
      }
    }
    await update(ref(db, 'armory/' + cat + '/' + itemId), { holderId: null, holderName: null });
    await _logActivity('זיכוי', item.name, itemId, item.holderName, ARMORY_CATS[cat]?.label || cat);
    showToast('שוחרר בהצלחה ✓');
    const freshSnap = await get(ref(db, 'armory'));
    if (freshSnap.exists()) {
      window._armoryData = freshSnap.val();
      _armoryDrawStats(window._armoryData);
      _armoryTab(cat);
    }
  };

  window._armoryAddItem = async function() {

    window._activeArmoryTab = cat;

  // ── HELPERS ───────────────────────────────────────────────────
  window._toBase64 = function(file) {
    return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(file); });
  };

  window._previewItemPhoto = function(inputId, previewId) {
    const file = document.getElementById(inputId)?.files[0];
    if (!file) return;
    const r = new FileReader();
    r.onload = e => {
      const el = document.getElementById(previewId);
      if (el) el.innerHTML = '<img src="' + e.target.result + '" class="w-full h-full object-cover"/>';
    };
    r.readAsDataURL(file);
  };

  async function _logActivity(type, itemName, sku, soldier, cond) {
    const now = new Date();
    const time = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    await push(ref(db, 'activity'), { type, itemName, sku, soldier: soldier||'', by: soldier||'', cond: cond||'', time });
  }
  window._logActivity = _logActivity;

  window._exportCSV = async function(whKey) {
    const snap = await get(ref(db, 'inventory/' + whKey));
    if (!snap.exists()) return;
    const data = snap.val();
    const rows = [['מק"ט','שם פריט','תקינה','בלאי','מנופק','סה"כ','סטטוס']];
    Object.entries(data).forEach(([sku, item]) => {
      rows.push([sku, item.name, item.good, item.wear, item.issued, (item.good||0)+(item.wear||0)+(item.issued||0), item.status]);
    });
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `inventory_${whKey}_${Date.now()}.csv`; a.click();
  };

  // Modal
  // ── ITEM DRAWER ───────────────────────────────────────────────
  window._openItemDrawer = async function(sku, whKey) {
    const drawer = document.getElementById('itemDrawer');
    const drawerContent = document.getElementById('itemDrawerContent');
    if (!drawer || !drawerContent) return;

    // Show drawer with loading state
    drawer.style.transform = 'translateX(0)';
    document.getElementById('itemDrawerBackdrop').style.display = 'block';
    drawerContent.innerHTML = `
      <div class="flex items-center justify-center py-16">
        <div class="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
      </div>`;

    // Fetch item data
    const itemSnap = await get(ref(db, 'inventory/' + whKey + '/' + sku));
    if (!itemSnap.exists()) return;
    const item = itemSnap.val();

    // Fetch all soldiers and filter those who have this SKU
    const solSnap = await get(ref(db, 'soldiers'));
    const allSoldiers = solSnap.val() || {};
    const holders = Object.entries(allSoldiers)
      .filter(([, s]) => (s.items || []).includes(sku))
      .map(([sid, s]) => ({ sid, ...s }));

    const statusBadge = (s) => {
      if (s === 'תקין') return `<span class="bg-primary/10 text-primary px-2 py-0.5 text-[10px] font-bold rounded-sm border border-primary/20">תקין</span>`;
      if (s === 'קריטי') return `<span class="bg-error/10 text-error px-2 py-0.5 text-[10px] font-bold rounded-sm border border-error/20">קריטי</span>`;
      return `<span class="bg-tertiary/10 text-tertiary px-2 py-0.5 text-[10px] font-bold rounded-sm border border-tertiary/20">בינוני</span>`;
    };

    drawerContent.innerHTML = `
      <!-- Item header -->
      <div class="flex gap-4 items-start mb-6 pb-5 border-b border-outline-variant/30">
        <div class="w-20 h-20 rounded-xl overflow-hidden bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shrink-0">
          ${item.photo
            ? '<img src="' + item.photo + '" class="w-full h-full object-cover"/>'
            : '<span class="material-symbols-outlined text-on-surface-variant/30 text-4xl">inventory_2</span>'}
        </div>
        <div class="flex-1 min-w-0">
          <p class="font-mono text-xs text-primary mb-1">#${sku}</p>
          <h3 class="font-headline font-bold text-lg text-on-surface leading-tight mb-2">${item.name}</h3>
          <div class="flex gap-2 flex-wrap">
            ${statusBadge(item.status)}
            <span class="bg-surface-container text-on-surface-variant px-2 py-0.5 text-[10px] font-bold rounded-sm border border-outline-variant/30">
              ${(item.good||0)+(item.wear||0)+(item.issued||0)} יחידות סה"כ
            </span>
          </div>
        </div>
      </div>

      <!-- Stock summary -->
      <div class="grid grid-cols-3 gap-2 mb-6">
        <div class="bg-primary/5 border border-primary/15 rounded-lg p-3 text-center">
          <p class="font-label text-[10px] text-on-surface-variant uppercase tracking-wider mb-1">תקינה</p>
          <p class="text-xl font-bold text-primary">${item.good||0}</p>
        </div>
        <div class="bg-tertiary/5 border border-tertiary/15 rounded-lg p-3 text-center">
          <p class="font-label text-[10px] text-on-surface-variant uppercase tracking-wider mb-1">בלאי</p>
          <p class="text-xl font-bold text-tertiary">${item.wear||0}</p>
        </div>
        <div class="bg-secondary/5 border border-secondary/15 rounded-lg p-3 text-center">
          <p class="font-label text-[10px] text-on-surface-variant uppercase tracking-wider mb-1">מנופק</p>
          <p class="text-xl font-bold text-secondary">${item.issued||0}</p>
        </div>
      </div>

      <!-- Holders list -->
      <div>
        <div class="flex items-center justify-between mb-3">
          <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest">חיילים חתומים</p>
          <span class="bg-primary/10 text-primary text-[10px] font-bold px-2 py-0.5 rounded-full border border-primary/20">
            ${holders.length}
          </span>
        </div>
        ${holders.length === 0
          ? '<div class="flex flex-col items-center justify-center py-8 text-center"><span class="material-symbols-outlined text-4xl text-on-surface-variant/30 mb-2">person_off</span><p class="text-sm text-on-surface-variant">אף חייל אינו חתום כרגע על פריט זה</p></div>'
          : holders.map(s => `
            <div class="flex items-center gap-3 py-3 border-b border-outline-variant/20 last:border-0 hover:bg-surface-container/50 rounded-lg px-2 transition-colors">
              <div class="w-10 h-10 rounded-xl overflow-hidden bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shrink-0">
                ${s.photo
                  ? '<img src="' + s.photo + '" class="w-full h-full object-cover"/>'
                  : '<span class="material-symbols-outlined text-on-surface-variant/40">person</span>'}
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-medium text-sm text-on-surface truncate">${s.name}</p>
                <p class="text-xs text-on-surface-variant">מס׳ ${s.id}</p>
              </div>
              <span class="text-xs font-label text-on-surface-variant px-2 py-0.5 rounded-sm bg-surface-container border border-outline-variant/20 shrink-0">${s.status || ''}</span>
            </div>`).join('')}
      </div>`;
  };

  window._closeItemDrawer = function() {
    document.getElementById('itemDrawer').style.transform = 'translateX(-110%)';
    document.getElementById('itemDrawerBackdrop').style.display = 'none';
  };

  function showModal(title, body, footer) {
    document.getElementById('drawerTitle').textContent = title;
    document.getElementById('drawerBody').innerHTML = body;
    document.getElementById('drawerFooter').innerHTML = footer || '';
    document.getElementById('formDrawer').style.transform = 'translateX(0)';
    document.getElementById('formDrawerBackdrop').style.display = 'block';
  }
  window.closeModal = function() {
    document.getElementById('formDrawer').style.transform = 'translateX(-110%)';
    document.getElementById('formDrawerBackdrop').style.display = 'none';
  };

  // Toast
  function showToast(msg, isError=false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `fixed top-20 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-sm font-label text-sm font-bold shadow-xl transition-all ${isError ? 'bg-error text-on-primary' : 'bg-primary text-on-primary'}`;
    t.classList.remove('opacity-0');
    setTimeout(() => t.classList.add('opacity-0'), 2500);
  }

  // ── ARMORY ───────────────────────────────────────────────────


  window._resetAllData = function() {
    showModal('איפוס מסד נתונים', `
      <div class="space-y-4">
        <div class="flex items-center gap-3 p-3 bg-red-50 rounded-xl border border-red-200">
          <span class="material-symbols-outlined text-red-500 text-2xl shrink-0">warning</span>
          <p class="text-sm text-red-700 font-semibold">פעולה זו תמחק את כל המלאי, ההיסטוריה, הבקשות והצל"מים. אין דרך חזרה!</p>
        </div>
        <div>
          <label class="field-lbl">סיסמת אישור</label>
          <input id="resetPass" class="field-inp" type="password" placeholder="הזן סיסמה לאישור" onkeydown="if(event.key==='Enter')window._confirmReset()"/>
          <p id="resetErr" class="text-xs text-red-500 mt-1 min-h-[16px]"></p>
        </div>
      </div>`,
      '<button onclick="closeModal()" class="btn-cancel">ביטול</button>' +
      '<button onclick="window._confirmReset()" class="btn-delete">מחק הכל</button>'
    );
    setTimeout(() => document.getElementById('resetPass')?.focus(), 150);
  };

  window._confirmReset = async function() {
    const pass = document.getElementById('resetPass')?.value;
    const err = document.getElementById('resetErr');
    if (pass !== '102030') {
      if (err) err.textContent = 'סיסמה שגויה ✗';
      const inp = document.getElementById('resetPass');
      if (inp) { inp.classList.add('border-red-400'); inp.value = ''; inp.focus(); }
      return;
    }
    closeModal();
    await remove(ref(db, 'inventory'));
    await remove(ref(db, 'activity'));
    await remove(ref(db, 'requests'));
    await remove(ref(db, 'armory'));
    await remove(ref(db, 'soldiers'));
    // ⚠️ Do NOT remove 'users' — it contains login data!
    showToast('כל הנתונים נמחקו ✓');
    setTimeout(() => location.reload(), 1500);
  };

  // ── PROFILE ───────────────────────────────────────────────────
  window._openProfile = async function() {
    const uid = currentUser?.uid;
    const sid = currentSoldierId;
    let soldier = null;
    if (sid) {
      const snap = await get(ref(db, 'soldiers/' + sid));
      if (snap.exists()) soldier = snap.val();
    }

    showModal('הפרופיל שלי', `
      <div class="space-y-4">
        <!-- Photo -->
        <div class="flex items-center gap-4 p-3 bg-surface-container rounded-sm border border-outline-variant/20">
          <div id="profilePhotoPrev" onclick="document.getElementById('profilePhotoInput').click()"
            class="w-16 h-16 rounded-full overflow-hidden bg-primary/10 border-2 border-dashed border-primary/30 flex items-center justify-center cursor-pointer hover:border-primary transition-colors shrink-0">
            ${soldier?.photo
              ? '<img src="' + soldier.photo + '" class="w-full h-full object-cover" id="profilePhotoImg"/>'
              : '<span class="material-symbols-outlined text-primary/50 text-2xl">add_photo_alternate</span>'}
          </div>
          <input id="profilePhotoInput" type="file" accept="image/*" class="hidden"
            onchange="window._previewPhoto('profilePhotoInput','profilePhotoPrev')"/>
          <div>
            <p class="font-label text-xs text-on-surface-variant uppercase tracking-wider mb-1">תמונת פרופיל</p>
            <button onclick="document.getElementById('profilePhotoInput').click()" class="text-xs text-primary font-bold hover:underline">החלף תמונה</button>
          </div>
        </div>
        <!-- Name & Phone -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="field-lbl">שם מלא</label>
            <input id="profileName" class="field-inp" type="text" value="${currentUser?.name || ''}"/>
          </div>
          <div>
            <label class="field-lbl">טלפון</label>
            <input id="profilePhone" class="field-inp" type="text" value="${soldier?.phone || ''}"/>
          </div>
          <div>
            <label class="field-lbl">מספר אישי</label>
            <input id="profileId" class="field-inp" type="text" value="${soldier?.id || ''}"/>
          </div>
        </div>
        <!-- Email & Password -->
        <div class="border-t border-outline-variant/20 pt-4 space-y-3">
          <p class="font-label text-xs text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5">
            <span class="material-symbols-outlined text-sm">lock</span>פרטי התחברות
          </p>
          <div>
            <label class="field-lbl">אימייל</label>
            <input id="profileEmail" class="field-inp" type="email" value="${soldier?.email || currentUser?.email || ''}"/>
          </div>
          <div>
            <label class="field-lbl">סיסמה חדשה <span class="text-on-surface-variant font-normal normal-case">(השאר ריק לאי-שינוי)</span></label>
            <input id="profilePass" class="field-inp" type="password" placeholder="••••••••"/>
          </div>
        </div>
        <p id="profileErr" class="text-xs text-error min-h-[16px]"></p>
      </div>`,
      '<button onclick="closeModal()" class="btn-cancel">ביטול</button>' +
      '<button onclick="window._saveProfile()" class="btn-save">שמור שינויים</button>'
    );
  };

  window._saveProfile = async function() {
    const name = document.getElementById('profileName').value.trim();
    const phone = document.getElementById('profilePhone').value.trim();
    const pid = document.getElementById('profileId').value.trim();
    const email = document.getElementById('profileEmail').value.trim();
    const pass = document.getElementById('profilePass').value;
    const errEl = document.getElementById('profileErr');
    if (!name) { if(errEl) errEl.textContent = 'נא למלא שם'; return; }

    // Photo
    let photo = null;
    const pi = document.getElementById('profilePhotoInput');
    if (pi?.files[0]) {
      photo = await new Promise(res => {
        const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(pi.files[0]);
      });
    }

    try {
      // Update soldier record
      if (currentSoldierId) {
        const upd = { name, phone, id: pid };
        if (photo) upd.photo = photo;
        await update(ref(db, 'soldiers/' + currentSoldierId), upd);
      }
      // Update user record
      const userUpd = { name };
      if (photo) userUpd.photo = photo;
      await update(ref(db, 'users/' + currentUser.uid), userUpd);
      currentUser.name = name;

      // Update Auth email/password
      const { updateEmail, updatePassword, getAuth } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      const authUser = getAuth().currentUser;
      if (email && authUser && email !== authUser.email) {
        try { await updateEmail(authUser, email); } catch(e) { if(errEl) errEl.textContent = 'שגיאה בעדכון אימייל: ' + e.message; return; }
        await update(ref(db, 'soldiers/' + currentSoldierId), { email });
      }
      if (pass) {
        try { await updatePassword(authUser, pass); } catch(e) { if(errEl) errEl.textContent = 'שגיאה בעדכון סיסמה: ' + e.message; return; }
      }

      // Update sidebar display
      const spn = document.getElementById('sideProfileName');
      if (spn) spn.textContent = name;
      if (photo) {
        const spp = document.getElementById('sideProfilePhoto');
        if (spp) spp.innerHTML = '<img src="' + photo + '" class="w-full h-full object-cover"/>';
      }

      closeModal();
      showToast('פרופיל עודכן ✓');
    } catch(e) {
      if(errEl) errEl.textContent = 'שגיאה: ' + e.message;
    }
  };

  // Init
  seedIfEmpty().catch(console.error);
</script>

/* Reset body to light */

  background: #f0f2f5 !important;
  color: #1a1f2e !important;

}

}

  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 6px;
  direction: rtl;
}

  display: flex;
  flex-direction: column;
  align-items: center;

}

  filter: none;

  padding: 5px 12px 5px 6px;

  transition: all .15s;

  direction: rtl;
}
.date-he { font-size: 12px; font-weight: 600; color: #3c4a5c; }
.date-sep { color: #1a73e8; }
.date-lat { font-size: 11px; color: #8a97a8; }

/* Bottom Nav */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  background: #ffffff;
  border-top: 1px solid #e5e9f0;
  display: flex !important;
  flex-direction: row-reverse;
  justify-content: space-around;
  align-items: center;
  padding: 6px 2px env(safe-area-inset-bottom, 6px);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
}
.bnav-item {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  padding: 6px 4px;
  border-radius: 10px;
  cursor: pointer;
  transition: all .15s;
  flex: 1;
  color: #9aa5b4;
  text-decoration: none;
  position: relative;
  border: none; background: transparent; font-family: inherit;
}
.bnav-item:hover { color: #5f6b7a; }
.bnav-item.nav-active { color: #1a73e8 !important; }
.bnav-item.nav-active::before {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%;
  height: 3px;
  background: #1a73e8;
  border-radius: 0 0 3px 3px;
}
.bnav-icon { font-size: 22px !important; }
.bnav-label { font-size: 9px; font-weight: 700; letter-spacing: .02em; }

/* Main content bg */
#mainContent {
  background: #f0f2f5 !important;
  direction: rtl;
}

/* Cards stay white */
.bg-surface-container,
.bg-surface-container-low,
.bg-surface-container-lowest,
.bg-surface-container-high,
.bg-surface-container-highest {
  background: #ffffff !important;
}
.bg-background { background: #f0f2f5 !important; }

/* Text colors */
.text-on-surface { color: #1a1f2e !important; }
.text-on-surface-variant { color: #5f6b7a !important; }

/* Primary → Google Blue */
.text-primary { color: #1a73e8 !important; }
.bg-primary { background: #1a73e8 !important; }
.border-primary { border-color: #1a73e8 !important; }
.bg-primary\/10 { background: rgba(26,115,232,0.1) !important; }
.bg-primary\/20 { background: rgba(26,115,232,0.15) !important; }
.border-primary\/20 { border-color: rgba(26,115,232,0.25) !important; }
.hover\:text-primary:hover { color: #1a73e8 !important; }

/* Nav link active */
.nav-link.text-primary { color: #1a73e8 !important; }
.nav-link.text-primary::before { background: #1a73e8 !important; }

/* Buttons */
.btn-save {
  background: #1a73e8 !important;
  color: #ffffff !important;
  border-radius: 10px !important;
  font-weight: 700 !important;
}
.btn-save:hover { background: #1557b0 !important; }

/* Form drawer */
#formDrawer { background: #ffffff !important; border-right: 1px solid #e5e9f0 !important; }
#drawerFooter { background: #f8faff !important; border-top: 1px solid #e5e9f0 !important; }

/* Inputs */
.field-inp {
  background: #ffffff !important;
  border: 1.5px solid #dce3ee !important;
  color: #1a1f2e !important;
  border-radius: 10px !important;
}
.field-inp:focus { border-color: #1a73e8 !important; box-shadow: 0 0 0 3px rgba(26,115,232,0.12) !important; }

/* Login screen fix */
#loginScreen {
  background: #f0f2f5;
  z-index: 100;
  position: relative;
}
#loginScreen .bg-surface-container { background: #ffffff !important; }

/* Table */
thead tr { background: #f8faff !important; }
tr:hover td { background: #f5f8ff !important; }
.divide-y > tr { border-color: #edf0f5 !important; }

/* Stat cards border */
.border-r-2.border-primary { border-color: #1a73e8 !important; }
.border-r-2.border-secondary { border-color: #0097a7 !important; }
.border-r-2.border-tertiary { border-color: #f57c00 !important; }
.border-r-2.border-error { border-color: #d93025 !important; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #f0f2f5; }
::-webkit-scrollbar-thumb { background: #c5cdd8; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #1a73e8; }

/* Shadows softer */
.shadow-lg { box-shadow: 0 4px 16px rgba(0,0,0,0.08) !important; }
.card-glow { box-shadow: 0 2px 8px rgba(0,0,0,0.06) !important; }

/* White/5 borders → light gray */
.border-white\/5 { border-color: #e5e9f0 !important; }
.border-white\/10 { border-color: #dce3ee !important; }
.divide-white\/5 > * { border-color: #edf0f5 !important; }

/* Login screen tidy */
#loginScreen h2 { color: #1a1f2e !important; }
#loginScreen h2 span { color: #1a73e8 !important; }

/* HUD bar - hide completely */
.h-7.bg-surface-container-lowest { display: none !important; }
</style>
</head>

            onblur="this.style.borderColor='#dce3ee';this.style.boxShadow='none'"
            onkeydown="if(event.key==='Enter')window._login()"/>
        </div>
        <div id="loginEmailRow" style="display:none;margin-bottom:12px">
          <label style="display:block;font-size:11px;font-weight:700;color:#5f6b7a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;text-align:right">אימייל</label>
          <input id="loginEmail" type="email" placeholder="your@email.com"
            style="width:100%;background:#f8faff;border:1.5px solid #dce3ee;border-radius:10px;padding:11px 14px;font-size:14px;color:#1a1f2e;outline:none;text-align:right;box-sizing:border-box;font-family:inherit"
            onfocus="this.style.borderColor='#1a73e8';this.style.boxShadow='0 0 0 3px rgba(26,115,232,0.12)'"
            onblur="this.style.borderColor='#dce3ee';this.style.boxShadow='none'"
            onkeydown="if(event.key==='Enter')window._login()"/>
        </div>
        <div style="margin-bottom:20px">
          <label style="display:block;font-size:11px;font-weight:700;color:#5f6b7a;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;text-align:right">סיסמה</label>
          <input id="loginPassword" type="password" placeholder="••••••••"
            style="width:100%;background:#f8faff;border:1.5px solid #dce3ee;border-radius:10px;padding:11px 14px;font-size:14px;color:#1a1f2e;outline:none;text-align:right;box-sizing:border-box;font-family:inherit"
            onfocus="this.style.borderColor='#1a73e8';this.style.boxShadow='0 0 0 3px rgba(26,115,232,0.12)'"
            onblur="this.style.borderColor='#dce3ee';this.style.boxShadow='none'"
            onkeydown="if(event.key==='Enter')window._login()"/>

          style="width:100%;padding:13px;background:#1a73e8;color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px"
          onmouseover="this.style.background='#1557b0'"
          onmouseout="this.style.background='#1a73e8'">

    </div>
