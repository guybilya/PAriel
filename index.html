<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>מחסן אריאל</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a73e8"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="מחסן אריאל"/>
<link rel="apple-touch-icon" href="icon-192.png"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, createUserWithEmailAndPassword, updateEmail, updatePassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD6fG2R9bjRq4PygvAwI3wgbQe2JViUzcQ",
    authDomain: "ariel-e997b.firebaseapp.com",
    databaseURL: "https://ariel-e997b-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "ariel-e997b",
    storageBucket: "ariel-e997b.firebasestorage.app",
    messagingSenderId: "21505786554",
    appId: "1:21505786554:web:f3334072367f936251b883"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  let currentUser = null;
  let currentRole = null;
  let currentSoldierId = null;
  let activePage = 'warehouse_a';

  function dbg(msg) {
    const el = document.getElementById('debugLog');
    if (el) el.textContent = msg;
  }

  // ── AUTH ──────────────────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      dbg('טוען נתונים...');
      const snap = await get(ref(db, 'users/' + user.uid));
      if (snap.exists()) {
        const data = snap.val();
        currentUser = { ...data, uid: user.uid };
        currentRole = data.role;
        currentSoldierId = (data.soldierId && data.soldierId !== "") ? data.soldierId : null;
        activePage = (currentRole === 'soldier') ? 'my_gear' : 'warehouse_a';
        showApp();
        setTimeout(() => { updateNav(); loadCurrentPage(); }, 50);
      } else {
        showLogin();
      }
    } else {
      showLogin();
    }
  });

  window._loginReal = async function() {
    const pass = document.getElementById('loginPassword').value.trim();
    const err = document.getElementById('loginError');
    err.textContent = '';
    if (!pass) { err.textContent = 'נא להזין סיסמה'; return; }

    if (window._loginTab === 'email') {
      const email = document.getElementById('loginEmail').value.trim();
      if (!email) { err.textContent = 'נא להזין אימייל'; return; }
      try { await signInWithEmailAndPassword(auth, email, pass); return; }
      catch(e) { err.textContent = 'אימייל או סיסמה שגויים'; return; }
    }

    const personalId = document.getElementById('loginPersonalId').value.trim();
    if (!personalId) { err.textContent = 'נא להזין מספר אישי'; return; }
    try {
      const solSnap = await get(ref(db, 'soldiers'));
      if (solSnap.exists()) {
        const match = Object.values(solSnap.val()).find(s => String(s.id) === String(personalId));
        if (match?.email) { await signInWithEmailAndPassword(auth, match.email, pass); return; }
      }
      const usersSnap = await get(ref(db, 'users'));
      if (usersSnap.exists()) {
        const match = Object.values(usersSnap.val()).find(u => String(u.id) === String(personalId));
        if (match?.email) { await signInWithEmailAndPassword(auth, match.email, pass); return; }
      }
    } catch(e) {}
    err.textContent = 'מספר אישי או סיסמה שגויים';
  };

  window._logout = async function() { await signOut(auth); };

  // ── SHOW / HIDE ───────────────────────────────────────────────
  function showApp() {
    const ls = document.getElementById('loginScreen');
    const as = document.getElementById('appShell');
    if (ls) { ls.style.display = 'none'; ls.setAttribute('hidden',''); }
    if (as) { as.removeAttribute('hidden'); as.style.display = 'flex'; }
    // Date
    try {
      const now = new Date();
      const lat = now.toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
      let heDate = '';
      try { heDate = now.toLocaleDateString('he-IL-u-ca-hebrew',{day:'numeric',month:'long',year:'numeric'}); }
      catch(e) { heDate = now.toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'}); }
      const toHebNum = n => {
        const ones=['','א','ב','ג','ד','ה','ו','ז','ח','ט'],tens=['','י','כ','ל','מ','נ','ס','ע','פ','צ'],hundreds=['','ק','ר','ש','ת','תק','תר','תש','תת','תתק'];
        n=parseInt(n); if(!n||n<=0) return '';
        let r='';
        if(n>=1000){r+=ones[Math.floor(n/1000)]+"'";n%=1000;}
        if(n>=100){r+=hundreds[Math.floor(n/100)];n%=100;}
        if(n===16) return r+'טז'; if(n===15) return r+'טו';
        if(n>=10){r+=tens[Math.floor(n/10)];n%=10;}
        if(n>0) r+=ones[n];
        if(r.length>1) r=r.slice(0,-1)+'״'+r.slice(-1); else if(r.length===1) r+='׳';
        return r;
      };
      heDate = heDate.replace(/(\d+)/g, n => toHebNum(parseInt(n)));
      const hed = document.getElementById('headerDateHe');
      const latd = document.getElementById('headerDateLat');
      if (hed) hed.textContent = heDate;
      if (latd) latd.textContent = lat;
    } catch(e) {}
    const spn = document.getElementById('sideProfileName');
    if (spn) spn.textContent = currentUser?.name || '';
    ['resetBtn'].forEach(id => {
      const el = document.getElementById(id);
      if (el && currentRole === 'rasp') el.classList.remove('hidden');
    });
  }

  function showLogin() {
    const ls = document.getElementById('loginScreen');
    const as = document.getElementById('appShell');
    if (ls) { ls.removeAttribute('hidden'); ls.style.display = 'flex'; }
    if (as) { as.style.display = 'none'; as.setAttribute('hidden',''); }
  }

  // ── NAV ───────────────────────────────────────────────────────
  function updateNav() {
    const nav = document.getElementById('mainNav');
    if (!nav) return;
    const isSoldier = currentRole === 'soldier';
    const raspItems = [
      {p:'warehouse_a',i:'inventory_2',l:'מחסן א׳'},
      {p:'warehouse_b',i:'warehouse',l:'מחסן ב׳'},
      {p:'warehouse_donations',i:'volunteer_activism',l:'תרומות'},
      {p:'register',i:'assignment',l:'רישום'},
      {p:'history',i:'history',l:'היסטוריה'},
      {p:'soldiers',i:'groups',l:'חיילים'},
      {p:'requests',i:'reorder',l:'בקשות'},
      {p:'armory',i:'photo_camera',l:'צל"מים'},
    ];
    const soldierItems = [
      {p:'my_gear',i:'inventory_2',l:'הציוד שלי'},
      {p:'my_history',i:'history',l:'היסטוריה'},
      {p:'my_requests',i:'reorder',l:'בקשות'},
    ];
    const items = isSoldier ? soldierItems : raspItems;
    nav.innerHTML = items.map(({p,i,l}) =>
      `<a data-nav="${p}" onclick="window._nav('${p}')" class="bnav-item${activePage===p?' nav-active':''}">
        <span class="material-symbols-outlined bnav-icon">${i}</span>
        <span class="bnav-label">${l}</span>
      </a>`
    ).join('');
  }

  window._nav = function(page) {
    activePage = page;
    updateNav();
    loadCurrentPage();
    const mc = document.getElementById('mainContent');
    if (mc) mc.scrollTop = 0;
  };

  function loadCurrentPage() {
    if (currentRole === 'soldier') {
      switch(activePage) {
        case 'my_gear': renderMyGear(); return;
        case 'my_history': renderMyHistory(); return;
        case 'my_requests': renderMyRequests(); return;
        default: activePage='my_gear'; updateNav(); renderMyGear(); return;
      }
    }
    switch(activePage) {
      case 'warehouse_a': renderWarehouse('warehouse_a','מחסן א׳'); break;
      case 'warehouse_b': renderWarehouse('warehouse_b','מחסן ב׳'); break;
      case 'warehouse_donations': renderWarehouse('warehouse_donations','מחסן תרומות'); break;
      case 'armory': renderArmory(); break;
      case 'register': renderRegister(); break;
      case 'history': renderHistory(); break;
      case 'soldiers': renderSoldiers(); break;
      case 'requests': renderRequests(); break;
      case 'my_gear': renderMyGear(); break;
    }
  }

  // ── WAREHOUSE ─────────────────────────────────────────────────
  function renderWarehouse(whKey, title) {
    const content = document.getElementById('mainContent');
    content.innerHTML = `<div class="p-4 space-y-4">
      <div class="flex flex-col gap-3">
        <div>
          <span class="font-label text-xs text-primary uppercase tracking-widest block">מבצעי לוגיסטיקה</span>
          <h2 class="font-headline text-3xl font-extrabold tracking-tighter">${title}</h2>
        </div>
        <div class="flex gap-2 flex-wrap">
          <div class="relative flex-1">
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant" style="font-size:16px">search</span>
            <input id="searchBox" class="bg-surface-container-low border-b border-outline-variant focus:border-primary focus:ring-0 text-sm py-2 pr-10 pl-3 w-full" placeholder="חיפוש..." oninput="window._filterTable()" type="text"/>
          </div>
          ${currentRole==='rasp'?`<button onclick="window._openAddItem('${whKey}')" class="bg-primary text-on-primary font-label text-xs font-bold px-3 py-2 rounded-sm flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:16px">add</span> חדש</button>`:''}
          <button onclick="window._exportCSV('${whKey}')" class="bg-surface-container-highest text-primary font-label text-xs font-bold px-3 py-2 rounded-sm border border-primary/10 flex items-center gap-1"><span class="material-symbols-outlined" style="font-size:16px">sim_card_download</span> CSV</button>
        </div>
      </div>
      <div id="statsGrid" class="grid grid-cols-2 gap-3"></div>
      <div class="bg-surface-container rounded-sm overflow-hidden border border-white/5">
        <div class="overflow-x-auto">
          <table class="w-full text-right border-collapse" style="min-width:600px">
            <thead class="bg-surface-container-high">
              <tr>
                <th class="px-2 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase w-10">תמונה</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">מק"ט</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widets border-b border-white/10 uppercase">תיאור</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">תקינה</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">בלאי</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">מנופק</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">סה"כ</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">נדרש</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">חוסר</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">סטטוס</th>
                <th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase w-10">👁</th>
                ${currentRole==='rasp'?'<th class="px-3 py-3 font-label text-[10px] text-on-surface-variant tracking-widest border-b border-white/10 uppercase">פעולות</th>':''}
              </tr>
            </thead>
            <tbody id="inventoryTableBody" class="divide-y divide-white/5"></tbody>
          </table>
        </div>
        <div class="px-4 py-2 bg-surface-container-high border-t border-white/10">
          <span id="tableCount" class="font-label text-[10px] text-on-surface-variant uppercase tracking-widest">טוען...</span>
        </div>
      </div>
    </div>`;

    window._currentWarehouse = whKey;
    onValue(ref(db, 'inventory/' + whKey), (snap) => {
      const data = snap.val() || {};
      window._warehouseData = data;
      renderInventoryTable(data);
      renderStats(data);
    });
  }

  function renderStats(data) {
    const items = Object.values(data);
    const total = items.length;
    const critical = items.filter(i => calcStatus(i).status === 'קריטי').length;
    const issued = items.reduce((s,i) => s+(i.issued||0), 0);
    const totalShortage = items.reduce((s,i) => {
      const tot = (i.good||0)+(i.wear||0)+(i.issued||0);
      return s + (i.required ? Math.max(0, i.required - tot) : 0);
    }, 0);
    const grid = document.getElementById('statsGrid');
    if (!grid) return;
    grid.innerHTML = `
      <div class="bg-surface-container-low p-3 rounded-sm border-r-2 border-primary">
        <span class="font-label text-[10px] text-on-surface-variant block mb-1">סה"כ מק"טים</span>
        <div class="text-2xl font-headline font-bold">${total}</div>
      </div>
      <div class="bg-surface-container-low p-3 rounded-sm border-r-2 border-error">
        <span class="font-label text-[10px] text-on-surface-variant block mb-1">קריטיים</span>
        <div class="text-2xl font-headline font-bold text-error">${critical}</div>
      </div>
      <div class="bg-surface-container-low p-3 rounded-sm border-r-2 border-tertiary">
        <span class="font-label text-[10px] text-on-surface-variant block mb-1">חוסרים</span>
        <div class="text-2xl font-headline font-bold text-tertiary">${totalShortage||'—'}</div>
      </div>
      <div class="bg-surface-container-low p-3 rounded-sm border-r-2 border-secondary">
        <span class="font-label text-[10px] text-on-surface-variant block mb-1">נופק</span>
        <div class="text-2xl font-headline font-bold text-secondary">${issued}</div>
      </div>`;
  }

  window._filterTable = function() {
    const q = (document.getElementById('searchBox')?.value||'').toLowerCase();
    if (!window._warehouseData) return;
    const filtered = {};
    Object.entries(window._warehouseData).forEach(([k,v]) => {
      if (k.toLowerCase().includes(q) || (v.name||'').toLowerCase().includes(q)) filtered[k] = v;
    });
    renderInventoryTable(filtered, true);
  };

  function calcStatus(item) {
    const total = (item.good||0)+(item.wear||0)+(item.issued||0);
    const required = item.required||0;
    if (!required) return { status: item.status||'תקין', shortage:0, pct:100 };
    const shortage = Math.max(0, required - total);
    const pct = required > 0 ? Math.round((total/required)*100) : 100;
    let status = 'תקין';
    if (pct < 40) status = 'קריטי';
    else if (pct < 70) status = 'בינוני';
    return { status, shortage, pct };
  }

  function statusBadge(s) {
    if (s==='תקין') return `<span class="bg-primary/10 text-primary px-2 py-0.5 text-[10px] font-bold rounded-sm border border-primary/20">תקין</span>`;
    if (s==='קריטי') return `<span class="bg-error/10 text-error px-2 py-0.5 text-[10px] font-bold rounded-sm border border-error/20">קריטי</span>`;
    return `<span class="bg-tertiary/10 text-tertiary px-2 py-0.5 text-[10px] font-bold rounded-sm border border-tertiary/20">בינוני</span>`;
  }

  function renderInventoryTable(data) {
    const tbody = document.getElementById('inventoryTableBody');
    const count = document.getElementById('tableCount');
    if (!tbody) return;
    const entries = Object.entries(data);
    if (!entries.length) {
      tbody.innerHTML = '<tr><td colspan="12" class="text-center py-8 text-on-surface-variant text-sm">אין פריטים</td></tr>';
      if (count) count.textContent = '0 רשומות';
      return;
    }
    tbody.innerHTML = entries.map(([sku, item]) => {
      const total = (item.good||0)+(item.wear||0)+(item.issued||0);
      const { status, shortage } = calcStatus(item);
      const shortageCell = shortage > 0
        ? `<td class="px-3 py-3"><span class="inline-flex items-center gap-1 bg-error/10 text-error px-2 py-0.5 text-[10px] font-bold rounded-sm border border-error/20"><span class="material-symbols-outlined" style="font-size:11px">arrow_downward</span>${shortage}</span></td>`
        : `<td class="px-3 py-3 text-on-surface-variant/40 text-xs">—</td>`;
      const requiredCell = item.required
        ? `<td class="px-3 py-3 text-on-surface-variant">${item.required}</td>`
        : `<td class="px-3 py-3 text-on-surface-variant/40 text-xs">—</td>`;
      return `<tr class="hover:bg-white/5 transition-colors">
        <td class="px-2 py-2">
          <div class="w-9 h-9 rounded-lg overflow-hidden bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shrink-0">
            ${item.photo?`<img src="${item.photo}" class="w-full h-full object-cover"/>`:`<span class="material-symbols-outlined text-on-surface-variant/30" style="font-size:16px">image</span>`}
          </div>
        </td>
        <td class="px-3 py-3 font-mono text-xs text-primary">#${sku}</td>
        <td class="px-3 py-3 font-medium text-sm">${item.name||''}</td>
        <td class="px-3 py-3 font-medium text-emerald-700">${item.good||0}</td>
        <td class="px-3 py-3 text-amber-600">${item.wear||0}</td>
        <td class="px-3 py-3 text-on-surface-variant">${item.issued||0}</td>
        <td class="px-3 py-3 font-bold">${total}</td>
        ${requiredCell}
        ${shortageCell}
        <td class="px-3 py-3">${statusBadge(status)}</td>
        <td class="px-3 py-3">
          <button onclick="window._openItemDrawer('${sku}','${window._currentWarehouse}')"
            class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-primary/10 text-on-surface-variant hover:text-primary transition-colors"
            title="חיילים חתומים">
            <span class="material-symbols-outlined" style="font-size:18px">visibility</span>
          </button>
        </td>
        ${currentRole==='rasp'?`<td class="px-3 py-3">
          <div class="flex gap-2">
            <button onclick="window._openEditItem('${window._currentWarehouse}','${sku}')" class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors" style="font-size:20px">edit_note</button>
            <button onclick="window._deleteItem('${window._currentWarehouse}','${sku}')" class="material-symbols-outlined text-on-surface-variant hover:text-error transition-colors" style="font-size:20px">delete</button>
          </div>
        </td>`:''}
      </tr>`;
    }).join('');
    if (count) count.textContent = `${entries.length} רשומות`;
  }

  // ── ITEM DRAWER ───────────────────────────────────────────────
  window._openItemDrawer = async function(sku, whKey) {
    const drawer = document.getElementById('itemDrawer');
    const drawerContent = document.getElementById('itemDrawerContent');
    if (!drawer || !drawerContent) return;
    drawer.style.transform = 'translateX(0)';
    document.getElementById('itemDrawerBackdrop').style.display = 'block';
    drawerContent.innerHTML = `<div class="flex items-center justify-center py-16"><div class="w-8 h-8 border-2 border-primary border-t-transparent rounded-full animate-spin"></div></div>`;

    try {
      const [itemSnap, solSnap] = await Promise.all([
        get(ref(db, 'inventory/' + whKey + '/' + sku)),
        get(ref(db, 'soldiers'))
      ]);
      if (!itemSnap.exists()) { drawerContent.innerHTML = '<p class="text-center py-8 text-on-surface-variant">פריט לא נמצא</p>'; return; }
      const item = itemSnap.val();
      const allSoldiers = solSnap.val() || {};
      const holders = Object.entries(allSoldiers)
        .filter(([, s]) => (s.items||[]).includes(sku))
        .map(([sid, s]) => ({ sid, ...s }));

      drawerContent.innerHTML = `
        <div class="flex gap-4 items-start mb-5 pb-4 border-b border-outline-variant/30">
          <div class="w-16 h-16 rounded-xl overflow-hidden bg-surface-container-high border border-outline-variant/30 flex items-center justify-center shrink-0">
            ${item.photo?`<img src="${item.photo}" class="w-full h-full object-cover"/>`:`<span class="material-symbols-outlined text-on-surface-variant/30" style="font-size:32px">inventory_2</span>`}
          </div>
          <div class="flex-1 min-w-0">
            <p class="font-mono text-xs text-primary mb-1">#${sku}</p>
            <h3 class="font-headline font-bold text-lg text-on-surface leading-tight mb-2">${item.name}</h3>
            ${statusBadge(calcStatus(item).status)}
          </div>
        </div>
        <div class="grid grid-cols-3 gap-2 mb-5">
          <div class="bg-primary/5 border border-primary/15 rounded-lg p-3 text-center">
            <p class="font-label text-[10px] text-on-surface-variant uppercase mb-1">תקינה</p>
            <p class="text-xl font-bold text-primary">${item.good||0}</p>
          </div>
          <div class="bg-tertiary/5 border border-tertiary/15 rounded-lg p-3 text-center">
            <p class="font-label text-[10px] text-on-surface-variant uppercase mb-1">בלאי</p>
            <p class="text-xl font-bold text-tertiary">${item.wear||0}</p>
          </div>
          <div class="bg-secondary/5 border border-secondary/15 rounded-lg p-3 text-center">
            <p class="font-label text-[10px] text-on-surface-variant uppercase mb-1">מנופק</p>
            <p class="text-xl font-bold text-secondary">${item.issued||0}</p>
          </div>
        </div>
        <div>
          <div class="flex items-center justify-between mb-3">
            <p class="font-label text-xs text-on-surface-variant uppercase tracking-widest">חיילים חתומים</p>

      .map(([sku,item]) => `<option value="${sku}">${item.name} (${sku})</option>`)
      .join('');

    const container = document.getElementById('itemRowsContainer');
    if (!container) return;

    const row = document.createElement('div');
    row.id = 'item-row-' + id;
    row.className = 'bg-surface-container rounded-sm p-3 border border-outline-variant/20';
    row.innerHTML = `

    row.dataset.cond = 'good';

  window._setRowCond = function(id, cond, btn) {
    const row = document.getElementById('item-row-' + id);
    if (!row) return;
    row.dataset.cond = cond;
    const good = row.querySelector('.cond-btn-good');
    const wear = row.querySelector('.cond-btn-wear');
    if (cond === 'good') {
      good.className = 'cond-btn-good flex-1 py-1.5 border-2 border-primary/40 bg-primary/10 text-primary font-label text-[10px] font-bold rounded-sm flex items-center justify-center gap-1';
      wear.className = 'cond-btn-wear flex-1 py-1.5 border border-outline-variant/30 text-on-surface-variant font-label text-[10px] font-bold rounded-sm flex items-center justify-center gap-1';
    } else {
      wear.className = 'cond-btn-wear flex-1 py-1.5 border-2 border-tertiary/40 bg-tertiary/10 text-tertiary font-label text-[10px] font-bold rounded-sm flex items-center justify-center gap-1';
      good.className = 'cond-btn-good flex-1 py-1.5 border border-outline-variant/30 text-on-surface-variant font-label text-[10px] font-bold rounded-sm flex items-center justify-center gap-1';
    }
  };

  window._onItemRowChange = function(sel, id) {
    const sku = sel.value;
    const infoEl = document.getElementById('stock-info-' + id);
    if (!infoEl) return;
    if (!sku || !window._allItemsFlat?.[sku]) { infoEl.classList.add('hidden'); return; }
    const item = window._allItemsFlat[sku];
    infoEl.classList.remove('hidden');
    infoEl.querySelector('.stock-good').textContent = item.good || 0;
    infoEl.querySelector('.stock-wear').textContent = item.wear || 0;
    infoEl.querySelector('.stock-issued').textContent = item.issued || 0;
  };

  window._removeItemRow = function(id) {
    const row = document.getElementById('item-row-' + id);
    if (row) row.remove();
    window._itemRows = (window._itemRows || []).filter(r => r !== id);
    _updateItemCount();
  };

  function _updateItemCount() {
    const c = document.getElementById('itemCount');
    const n = document.querySelectorAll('#itemRowsContainer > div').length;
    if (c) c.textContent = n + ' פריטים';
  }

  window._onItemChange = function() {
    const sku = document.getElementById('reg_sku')?.value;
    if (!sku || !window._allItemsFlat) return;
    const item = window._allItemsFlat[sku];
    if (!item) return;
    const si = document.getElementById('stockInfo');
    if (si) {
      si.classList.remove('hidden');
      const sg = document.getElementById('stockGood');
      const sw = document.getElementById('stockWear');
      const sis = document.getElementById('stockIssued');
      if(sg) sg.textContent = item.good||0;
      if(sw) sw.textContent = item.wear||0;
      if(sis) sis.textContent = item.issued||0;
    }
  };


  window._setCond = function(cond) {
    window._regCond = cond;
    const g = document.getElementById('condGood');
    const w = document.getElementById('condWear');
    if (!g||!w) return;
    if (cond==='good') {
      g.className='flex-1 py-2.5 border-2 border-primary/40 bg-primary/10 text-primary font-label text-xs font-bold rounded-sm flex items-center justify-center gap-1';
      w.className='flex-1 py-2.5 border border-outline-variant/30 text-on-surface-variant font-label text-xs font-bold rounded-sm flex items-center justify-center gap-1';
    } else {
      w.className='flex-1 py-2.5 border-2 border-tertiary/40 bg-tertiary/10 text-tertiary font-label text-xs font-bold rounded-sm flex items-center justify-center gap-1';
      g.className='flex-1 py-2.5 border border-outline-variant/30 text-on-surface-variant font-label text-xs font-bold rounded-sm flex items-center justify-center gap-1';
    }
  };

  window._setRegType = function(type) {
    window._regType = type;
    ['regTypeIssue','regTypeReturn','regTypeTransfer'].forEach(id => {
      const btn = document.getElementById(id);
      if (!btn) return;
      btn.classList.remove('border-2','border-primary/40','border-secondary/40','border-tertiary/40');
      btn.classList.add('border','border-outline-variant/30');
      const h = btn.querySelector('.font-headline');
      const ic = btn.querySelector('.material-symbols-outlined');
      if (h) { h.classList.remove('text-primary','text-secondary','text-tertiary'); h.classList.add('text-on-surface-variant'); }
      if (ic) { ic.classList.remove('text-primary','text-secondary','text-tertiary'); ic.classList.add('text-on-surface-variant'); }
    });
    const colMap = {issue:'primary',return:'secondary',transfer:'tertiary'};
    const idMap = {issue:'regTypeIssue',return:'regTypeReturn',transfer:'regTypeTransfer'};
    const col = colMap[type]||'primary';
    const btn = document.getElementById(idMap[type]);
    if (btn) {
      btn.classList.remove('border','border-outline-variant/30');
      btn.classList.add('border-2','border-'+col+'/40');
      const h = btn.querySelector('.font-headline');
      const ic = btn.querySelector('.material-symbols-outlined');
      if (h) { h.classList.remove('text-on-surface-variant'); h.classList.add('text-'+col); }
      if (ic) { ic.classList.remove('text-on-surface-variant'); ic.classList.add('text-'+col); }
    }
    const soldierRow = document.getElementById('reg_soldier_row');
    const whToRow = document.getElementById('reg_wh_to_row');
    const whFromLabel = document.getElementById('reg_wh_from_label');
    if (type==='transfer') {
      soldierRow?.classList.add('hidden');
      whToRow?.classList.remove('hidden');
      if (whFromLabel) whFromLabel.textContent='מחסן מקור';
    } else {
      soldierRow?.classList.remove('hidden');
      whToRow?.classList.add('hidden');
      if (whFromLabel) whFromLabel.textContent='מחסן';
    }
  };

  window._reloadItemsForWarehouse = async function() {
    const wh = document.getElementById('reg_wh_from')?.value;
    if (!wh) return;
    const snap = await get(ref(db, 'inventory/' + wh));
    const data = snap.val() || {};
    window._allItemsFlat = window._allItemsFlat || {};
    Object.entries(data).forEach(([sku,item]) => { window._allItemsFlat[sku]=item; if(!window._warehouseByItem) window._warehouseByItem={}; window._warehouseByItem[sku]=wh; });
    // Rebuild all existing item rows' selects

  window._submitRegister = async function() {
    const soldierSid = document.getElementById('reg_soldier')?.value;
    const regType = window._regType || 'issue';
    const whFrom = document.getElementById('reg_wh_from')?.value || 'warehouse_a';
    const whTo = document.getElementById('reg_wh_to')?.value || 'warehouse_b';

    // Collect all item rows
    const rows = document.querySelectorAll('#itemRowsContainer > div');
    if (!rows.length) { showToast('נא להוסיף לפחות פריט אחד', true); return; }

    const itemsToProcess = [];
    let hasError = false;

    rows.forEach(row => {
      const skuSel = row.querySelector('.item-sku-select');
      const qtyInput = row.querySelector('.item-qty-input');
      const sku = skuSel?.value;
      const qty = parseInt(qtyInput?.value) || 1;
      const cond = row.dataset.cond || 'good';
      if (!sku) { showToast('נא לבחור פריט בכל השורות', true); hasError = true; return; }
      itemsToProcess.push({ sku, qty, cond });
    });

    if (hasError) return;
    if (!itemsToProcess.length) { showToast('נא לבחור פריטים', true); return; }

    // ── TRANSFER ────────────────────────────────────────────────
    if (regType === 'transfer') {
      if (whFrom === whTo) { showToast('מחסן מקור ויעד זהים!', true); return; }
      for (const { sku, qty, cond } of itemsToProcess) {
        const snapFrom = await get(ref(db, 'inventory/' + whFrom + '/' + sku));
        const fromItem = snapFrom.val();
        if (!fromItem) { showToast('פריט לא קיים במחסן המקור: ' + sku, true); return; }
        const avail = cond === 'good' ? (fromItem.good||0) : (fromItem.wear||0);
        if (qty > avail) { showToast('אין מספיק ' + fromItem.name + '! זמין: ' + avail, true); return; }
        if (cond === 'good') await update(ref(db,'inventory/'+whFrom+'/'+sku),{good:avail-qty});
        else await update(ref(db,'inventory/'+whFrom+'/'+sku),{wear:avail-qty});
        const snapTo = await get(ref(db,'inventory/'+whTo+'/'+sku));
        if (snapTo.exists()) {
          const ti = snapTo.val();
          if (cond==='good') await update(ref(db,'inventory/'+whTo+'/'+sku),{good:(ti.good||0)+qty});
          else await update(ref(db,'inventory/'+whTo+'/'+sku),{wear:(ti.wear||0)+qty});
        } else {
          await set(ref(db,'inventory/'+whTo+'/'+sku),{...fromItem,good:cond==='good'?qty:0,wear:cond==='wear'?qty:0,issued:0});
        }
        const whNames={warehouse_a:'מחסן א׳',warehouse_b:'מחסן ב׳',warehouse_donations:'מחסן תרומות'};
        await _logActivity('העברה',fromItem.name,sku,currentUser?.name||'',whNames[whFrom]+' → '+whNames[whTo]);
      }
      showToast('העברה בוצעה — ' + itemsToProcess.length + ' פריטים ✓');
      window._addItemRow(); // reset
      document.getElementById('itemRowsContainer').innerHTML = '';
      window._itemRows = [];
      window._addItemRow();
      _updateItemCount();
      renderRecentOps();
      return;
    }

    // ── ISSUE / RETURN ───────────────────────────────────────────
    const type = regType === 'issue' ? 'ניפוק' : 'זיכוי';
    let soldierName = '';
    if (soldierSid) {
      const sn = await get(ref(db, 'soldiers/' + soldierSid + '/name'));
      soldierName = sn.val() || 'לא ידוע';
    } else {
      soldierName = currentUser?.name || 'לא ידוע';
    }

    for (const { sku, qty, cond } of itemsToProcess) {
      const item = window._allItemsFlat?.[sku];
      if (!item) { showToast('פריט לא נמצא: ' + sku, true); return; }
      const wh = window._warehouseByItem?.[sku] || whFrom;
      const snap = await get(ref(db, 'inventory/' + wh + '/' + sku));
      const current = snap.val() || {};

      if (type === 'ניפוק') {
        const avail = cond === 'good' ? (current.good||0) : (current.wear||0);
        if (qty > avail) { showToast('אין מספיק ' + item.name + '! זמין: ' + avail, true); return; }
        if (cond === 'good') await update(ref(db,'inventory/'+wh+'/'+sku),{good:avail-qty,issued:(current.issued||0)+qty});
        else await update(ref(db,'inventory/'+wh+'/'+sku),{wear:avail-qty,issued:(current.issued||0)+qty});
        if (soldierSid) {
          const sol = (await get(ref(db,'soldiers/'+soldierSid))).val()||{};
          const items = sol.items||[];
          if (!items.includes(sku)) items.push(sku);
          await update(ref(db,'soldiers/'+soldierSid),{items});
        }
      } else {
        if (cond==='good') await update(ref(db,'inventory/'+wh+'/'+sku),{good:(current.good||0)+qty,issued:Math.max(0,(current.issued||0)-qty)});
        else await update(ref(db,'inventory/'+wh+'/'+sku),{wear:(current.wear||0)+qty,issued:Math.max(0,(current.issued||0)-qty)});
        if (soldierSid) {
          const sol = (await get(ref(db,'soldiers/'+soldierSid))).val()||{};
          await update(ref(db,'soldiers/'+soldierSid),{items:(sol.items||[]).filter(i=>i!==sku)});
        }
      }
      await _logActivity(type, item.name, sku, soldierName, cond==='good'?'תקין':'בלאי');
    }

    showToast(type + ' בוצע — ' + itemsToProcess.length + ' פריטים ✓');
    // Reset rows
    document.getElementById('itemRowsContainer').innerHTML = '';
    window._itemRows = [];
    window._addItemRow();
    _updateItemCount();
    const soldierEl = document.getElementById('reg_soldier');
    if (soldierEl) soldierEl.value = '';
    renderRecentOps();
  };

  window._saveSoldier = async function() {
    const name = document.getElementById('s_name').value.trim();
    const id = document.getElementById('s_id').value.trim();

    let photoBase64='';
    const photoInput = document.getElementById('s_photo');
    if (photoInput?.files[0]) {
      photoBase64 = await new Promise(res=>{
        const img=new Image();
        const reader=new FileReader();
        reader.onload=e=>{
          img.onload=()=>{
            const canvas=document.createElement('canvas');
            const maxSize=200;
            let w=img.width,h=img.height;
            if(w>h){if(w>maxSize){h=h*maxSize/w;w=maxSize;}}
            else{if(h>maxSize){w=w*maxSize/h;h=maxSize;}}
            canvas.width=w;canvas.height=h;
            canvas.getContext('2d').drawImage(img,0,0,w,h);
            res(canvas.toDataURL('image/jpeg',0.7));
          };
          img.src=e.target.result;
        };
        reader.readAsDataURL(photoInput.files[0]);
      });
    }

    let uid='soldier_'+Date.now();
    if (email&&pass) {

  window._updateSoldier = async function(sid) {
    const photoInput = document.getElementById('s_photo_edit');
    let photoBase64=null;
    if (photoInput?.files[0]) {
      photoBase64=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(photoInput.files[0]);});
    }
    const itemsSelect=document.getElementById('s_items_e');
    const items=itemsSelect?Array.from(itemsSelect.selectedOptions).map(o=>o.value):[];
    const newEmail=document.getElementById('s_email_e')?.value.trim()||'';
    const newPass=document.getElementById('s_pass_e')?.value||'';
    const updateData={
      name:document.getElementById('s_name_e').value,
      id:document.getElementById('s_id_e').value,
      phone:document.getElementById('s_phone_e').value,
      role:document.getElementById('s_role_e').value,
      status:document.getElementById('s_status_e').value,
      email:newEmail,items
    };
    if (photoBase64) updateData.photo=photoBase64;
    await update(ref(db,'soldiers/'+sid),updateData);
    const usersSnap=await get(ref(db,'users'));
    if (usersSnap.exists()) {
      const uid=Object.entries(usersSnap.val()).find(([,u])=>u.soldierId===sid)?.[0];
      if (uid) {
        await update(ref(db,'users/'+uid),{name:updateData.name,role:updateData.role});
        if (uid===auth.currentUser?.uid) {
          try {
            if (newEmail&&newEmail!==auth.currentUser.email) await updateEmail(auth.currentUser,newEmail);
            if (newPass) await updatePassword(auth.currentUser,newPass);
          } catch(e) { showToast('עודכן. לא ניתן לשנות אימייל/סיסמה כרגע.',false); closeModal(); return; }
        }
      }
    }
    closeModal(); showToast('חייל עודכן ✓');
  };

  window._deleteSoldier = async function(sid) {
    const snap=await get(ref(db,'soldiers/'+sid));
    const s=snap.val();
    if (s?.items?.length>0) { showToast('לא ניתן — יש לזכות '+s.items.length+' פריטים תחילה', true); return; }
    let hasArmory=false;
    const armSnap=await get(ref(db,'armory'));
    if (armSnap.exists()) {
      Object.values(armSnap.val()).forEach(cat=>{
        Object.values(cat||{}).forEach(item=>{ if(item.holderId===sid) hasArmory=true; });
      });
    }
    if (hasArmory) { showToast('לא ניתן — יש לשחרר צל"מים תחילה', true); return; }
    if (!confirm('למחוק חייל זה לצמיתות?')) return;
    await remove(ref(db,'soldiers/'+sid));
    closeModal(); showToast('חייל נמחק ✓');
  };

  function renderArmory() {
    document.getElementById('mainContent').innerHTML=`

  window._armoryDrawStats=function(data){
    const el=document.getElementById('armoryStats');
    if(!el) return;
    el.innerHTML=Object.entries(ARMORY_CATS).map(([key,cat])=>{
      const items=Object.values(data[key]||{}).filter(i=>i.name&&i.name!=='undefined');
      const total=items.length,issued=items.filter(i=>i.holderId).length;
      return `<div class="bg-surface-container-low p-3 rounded-sm cursor-pointer hover:bg-surface-variant/30 transition-all border-r-2" style="border-color:${cat.color}" data-armcat="${key}" onclick="window._armoryTab(this.dataset.armcat)">
        <span class="font-label text-[10px] uppercase tracking-widest block mb-1" style="color:${cat.color}">${cat.label}</span>
        <div class="text-xl font-headline font-bold text-on-surface mb-1">${total}</div>
        <div class="flex gap-3 text-xs">
          <span class="text-emerald-500 font-semibold">פנוי: ${total-issued}</span>
          <span style="color:${cat.color}" class="font-semibold">מנופק: ${issued}</span>
        </div>
      </div>`;
    }).join('');
  };

  window._armoryRenderTable=function(filterCat){
    const tbody=document.getElementById('armoryTableBody');
    const countEl=document.getElementById('armoryCount');
    if(!tbody) return;
    const data=window._armoryData||{};
    const allSoldiers=window._soldiersData||{};
    const rows=[];
    Object.entries(data).forEach(([cat,items])=>{
      if(filterCat!=='all'&&filterCat!==cat) return;
      Object.entries(items||{}).forEach(([itemId,item])=>{
        if(!item.name||item.name==='undefined') return;
        rows.push({cat,itemId,...item});
      });
    });
    if(!rows.length){tbody.innerHTML='<tr><td colspan="6" class="text-center py-8 text-on-surface-variant text-sm">אין פריטים</td></tr>';if(countEl)countEl.textContent='0 פריטים';return;}
    const catColor=cat=>ARMORY_CATS[cat]?.color||'#6366f1';
    const catLabel=cat=>ARMORY_CATS[cat]?.label||cat;
    tbody.innerHTML=rows.map(row=>{
      const isIssued=!!row.holderId;
      const holderInfo=isIssued
        ?`<div class="flex items-center gap-2">${allSoldiers[row.holderId]?.photo?`<img src="${allSoldiers[row.holderId].photo}" class="w-6 h-6 rounded-full object-cover border border-white/10"/>`:'<span class="material-symbols-outlined text-on-surface-variant/40" style="font-size:14px">person</span>'}<span class="text-sm font-medium text-on-surface">${row.holderName||''}</span></div>`
        :'<span class="text-on-surface-variant/40 text-sm">—</span>';
      const statusBadge=(row.status==='תקין'||!row.status)
        ?'<span class="bg-primary/10 text-primary px-2 py-0.5 text-[10px] font-bold rounded-sm border border-primary/20">תקין</span>'
        :'<span class="bg-tertiary/10 text-tertiary px-2 py-0.5 text-[10px] font-bold rounded-sm border border-tertiary/20">בלאי</span>';
      const catBadge=`<span class="px-2 py-0.5 text-[10px] font-bold rounded-sm border" style="background:${catColor(row.cat)}15;color:${catColor(row.cat)};border-color:${catColor(row.cat)}30">${catLabel(row.cat)}</span>`;
      const actions=currentRole==='rasp'
        ?`<div class="flex gap-1.5">${isIssued
          ?`<button data-cat="${row.cat}" data-item="${row.itemId}" onclick="window._armoryRelease(this.dataset.cat,this.dataset.item)" class="font-label text-[10px] px-2 py-1 rounded-sm border border-error/20 text-error/70 hover:bg-error/10">שחרר</button>`
          :`<button data-cat="${row.cat}" data-item="${row.itemId}" onclick="window._armoryAssign(this.dataset.cat,this.dataset.item)" class="font-label text-[10px] px-2 py-1 rounded-sm border border-primary/20 text-primary hover:bg-primary/10">שייך</button>`}
          <button data-cat="${row.cat}" data-item="${row.itemId}" onclick="window._armoryDelete(this.dataset.cat,this.dataset.item)" class="material-symbols-outlined text-on-surface-variant/40 hover:text-error transition-colors" style="font-size:18px">delete</button></div>`
        :'';
      return `<tr class="hover:bg-white/5 transition-colors">
        <td class="px-3 py-3 font-mono text-xs text-primary">${row.itemId}</td>
        <td class="px-3 py-3 font-medium text-sm text-on-surface">${row.name}</td>
        <td class="px-3 py-3">${catBadge}</td>
        <td class="px-3 py-3">${statusBadge}</td>
        <td class="px-3 py-3">${holderInfo}</td>
        ${currentRole==='rasp'?`<td class="px-3 py-3">${actions}</td>`:''}
      </tr>`;
    }).join('');
    if(countEl) countEl.textContent='מציג '+rows.length+' פריטים';
  };

  window._armoryTab=function(cat){
    window._activeArmoryTab=cat;
    document.querySelectorAll('.armory-tab').forEach(b=>{
      const isActive=b.dataset.acat===cat;
      const col=b.dataset.acat==='all'?'#059669':(ARMORY_CATS[b.dataset.acat]?.color||'#6366f1');
      b.style.borderColor=isActive?col:'transparent';
      b.style.color=isActive?col:'#94a3b8';
      b.style.fontWeight=isActive?'700':'500';
    });
    _armoryRenderTable(cat);
  };

  window._armoryAssign=async function(cat,itemId){
    const solSnap=await get(ref(db,'soldiers'));
    const soldiers=solSnap.val()||{};
    const opts=Object.entries(soldiers).map(([sid,s])=>`<option value="${sid}">${s.name} (${s.id})</option>`).join('');
    showModal('שיוך חייל',`<div class="space-y-3">
      <div class="p-3 bg-slate-50 rounded-xl border border-slate-200">
        <p class="text-xs text-slate-500 mb-0.5">פריט</p>
        <p class="font-semibold text-slate-800">${window._armoryData?.[cat]?.[itemId]?.name} — ${itemId}</p>
      </div>
      <div><label class="field-lbl">בחר חייל</label><select id="armoryPickSoldier" class="field-inp">${opts}</select></div>
    </div>`,
    `<button onclick="closeModal()" class="btn-cancel">ביטול</button>
     <button onclick="window._armoryConfirmAssign('${cat}','${itemId}')" class="btn-save">שייך</button>`);
  };

  window._armoryConfirmAssign=async function(cat,itemId){
    const sid=document.getElementById('armoryPickSoldier').value;
    if(!sid) return;
    const s=(await get(ref(db,'soldiers/'+sid))).val();
    await update(ref(db,'armory/'+cat+'/'+itemId),{holderId:sid,holderName:s.name});
    const armoryKey=cat+'_'+itemId;
    const solItems=s.items||[];
    if(!solItems.includes(armoryKey)) await update(ref(db,'soldiers/'+sid),{items:[...solItems,armoryKey]});
    await _logActivity('ניפוק',window._armoryData?.[cat]?.[itemId]?.name||itemId,itemId,s.name,ARMORY_CATS[cat]?.label||cat);
    closeModal();showToast('שויך ✓');
    const freshSnap=await get(ref(db,'armory'));
    if(freshSnap.exists()){window._armoryData=freshSnap.val();_armoryDrawStats(window._armoryData);_armoryTab(cat);}
  };

  window._armoryDelete=async function(cat,itemId){
    if(!confirm('למחוק פריט זה?')) return;
    const snap=await get(ref(db,'armory/'+cat+'/'+itemId));
    const item=snap.val();
    if(item?.holderId){
      const s=(await get(ref(db,'soldiers/'+item.holderId))).val();
      if(s) await update(ref(db,'soldiers/'+item.holderId),{items:(s.items||[]).filter(i=>i!==cat+'_'+itemId)});
    }
    await remove(ref(db,'armory/'+cat+'/'+itemId));
    showToast('נמחק ✓');
    const freshSnap=await get(ref(db,'armory'));
    window._armoryData=freshSnap.val()||{};
    _armoryDrawStats(window._armoryData);
    _armoryRenderTable(window._activeArmoryTab);
  };

  window._armoryRelease=async function(cat,itemId){
    const item=window._armoryData?.[cat]?.[itemId];
    if(!item) return;
    if(!confirm('לשחרר פריט זה?')) return;
    if(item.holderId){
      const s=(await get(ref(db,'soldiers/'+item.holderId))).val();
      if(s) await update(ref(db,'soldiers/'+item.holderId),{items:(s.items||[]).filter(i=>i!==cat+'_'+itemId)});
    }
    await update(ref(db,'armory/'+cat+'/'+itemId),{holderId:null,holderName:null});
    await _logActivity('זיכוי',item.name,itemId,item.holderName,ARMORY_CATS[cat]?.label||cat);
    showToast('שוחרר ✓');
    const freshSnap=await get(ref(db,'armory'));
    if(freshSnap.exists()){window._armoryData=freshSnap.val();_armoryDrawStats(window._armoryData);_armoryTab(cat);}
  };

  window._openAddArmoryItem=function(){
    const catOpts=Object.entries(ARMORY_CATS).map(([k,v])=>`<option value="${k}" ${k===window._activeArmoryTab?'selected':''}>${v.label}</option>`).join('');
    showModal('הוספת פריט',`<div class="space-y-3">
      <div><label class="field-lbl">קטגוריה</label><select id="acat" class="field-inp">${catOpts}</select></div>
      <div><label class="field-lbl">מספר סידורי</label><input id="aId" class="field-inp" type="text" placeholder="CAM-004"/></div>
      <div><label class="field-lbl">שם / דגם</label><input id="aName" class="field-inp" type="text" placeholder="Canon EOS R5"/></div>
      <div><label class="field-lbl">מצב</label><select id="aStat" class="field-inp"><option>תקין</option><option>בלאי</option></select></div>

    `<button onclick="closeModal()" class="btn-cancel">ביטול</button>
     <button onclick="window._armoryAddItem()" class="btn-save">הוסף</button>`);

  window._armoryAddItem=async function(){
    const cat=document.getElementById('acat').value;
    const id=document.getElementById('aId').value.trim();
    const name=document.getElementById('aName').value.trim();
    const status=document.getElementById('aStat').value;
    if(!id||!name){showToast('נא למלא את כל השדות',true);return;}
    await set(ref(db,'armory/'+cat+'/'+id),{name,status,holderId:null,holderName:null});
    await _logActivity('הוספה',name,id,currentUser?.name||'',cat);
    closeModal();showToast('נוסף ✓');
    window._activeArmoryTab=cat;
    const freshSnap=await get(ref(db,'armory'));
    if(freshSnap.exists()){window._armoryData=freshSnap.val();_armoryDrawStats(window._armoryData);_armoryRenderTable(cat);}
  };

  // ── HELPERS ───────────────────────────────────────────────────
  window._toBase64=function(file){
    return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
  };

  window._previewItemPhoto=function(inputId,previewId){
    const file=document.getElementById(inputId)?.files[0];
    if(!file) return;
    const r=new FileReader();
    r.onload=e=>{const el=document.getElementById(previewId);if(el)el.innerHTML='<img src="'+e.target.result+'" class="w-full h-full object-cover"/>';};
    r.readAsDataURL(file);
  };

  async function _logActivity(type,itemName,sku,soldier,cond){
    const now=new Date();
    const time=`${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    await push(ref(db,'activity'),{type,itemName,sku,soldier:soldier||'',by:soldier||'',cond:cond||'',time});
  }
  window._logActivity=_logActivity;

  window._exportCSV=async function(whKey){
    const snap=await get(ref(db,'inventory/'+whKey));
    if(!snap.exists()) return;
    const data=snap.val();
    const rows=[['מק"ט','שם פריט','תקינה','בלאי','מנופק','סה"כ','סטטוס']];
    Object.entries(data).forEach(([sku,item])=>{
      rows.push([sku,item.name,item.good,item.wear,item.issued,(item.good||0)+(item.wear||0)+(item.issued||0),item.status]);
    });
    const csv=rows.map(r=>r.join(',')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`inventory_${whKey}_${Date.now()}.csv`;a.click();
  };

  window._resetAllData=function(){
    showModal('איפוס מסד נתונים',`<div class="space-y-4">
      <div class="flex items-center gap-3 p-3 bg-red-50 rounded-xl border border-red-200">
        <span class="material-symbols-outlined text-red-500 text-2xl shrink-0">warning</span>
        <p class="text-sm text-red-700 font-semibold">פעולה זו תמחק את כל המלאי, ההיסטוריה, הבקשות והצל"מים!</p>
      </div>
      <div>
        <label class="field-lbl">סיסמת אישור</label>
        <input id="resetPass" class="field-inp" type="password" placeholder="הזן סיסמה לאישור" onkeydown="if(event.key==='Enter')window._confirmReset()"/>
        <p id="resetErr" class="text-xs text-red-500 mt-1 min-h-[16px]"></p>
      </div>
    </div>`,
    '<button onclick="closeModal()" class="btn-cancel">ביטול</button><button onclick="window._confirmReset()" class="btn-delete">מחק הכל</button>');
    setTimeout(()=>document.getElementById('resetPass')?.focus(),150);
  };

  window._confirmReset=async function(){
    const pass=document.getElementById('resetPass')?.value;
    const err=document.getElementById('resetErr');
    if(pass!=='102030'){
      if(err) err.textContent='סיסמה שגויה ✗';
      const inp=document.getElementById('resetPass');
      if(inp){inp.classList.add('border-red-400');inp.value='';inp.focus();}
      return;
    }
    closeModal();
    await Promise.all([
      remove(ref(db,'inventory')),
      remove(ref(db,'activity')),
      remove(ref(db,'requests')),
      remove(ref(db,'armory')),
      remove(ref(db,'soldiers')),
    ]);
    showToast('כל הנתונים נמחקו ✓');
    setTimeout(()=>location.reload(),1500);
  };

  window._openProfile=async function(){
    let soldier=null;
    if(currentSoldierId){const s=await get(ref(db,'soldiers/'+currentSoldierId));if(s.exists())soldier=s.val();}
    showModal('הפרופיל שלי',`<div class="space-y-4">
      <div class="flex items-center gap-4 p-3 bg-surface-container rounded-sm border border-outline-variant/20">
        <div id="profilePhotoPrev" onclick="document.getElementById('profilePhotoInput').click()" class="w-14 h-14 rounded-full overflow-hidden bg-primary/10 border-2 border-dashed border-primary/30 flex items-center justify-center cursor-pointer shrink-0">
          ${soldier?.photo?`<img src="${soldier.photo}" class="w-full h-full object-cover"/>`:'<span class="material-symbols-outlined text-primary/50 text-2xl">add_photo_alternate</span>'}
        </div>
        <input id="profilePhotoInput" type="file" accept="image/*" class="hidden" onchange="window._previewPhoto('profilePhotoInput','profilePhotoPrev')"/>
        <div><p class="font-label text-xs text-on-surface-variant uppercase tracking-wider mb-1">תמונת פרופיל</p><button onclick="document.getElementById('profilePhotoInput').click()" class="text-xs text-primary font-bold">החלף</button></div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="field-lbl">שם מלא</label><input id="profileName" class="field-inp" type="text" value="${currentUser?.name||''}"/></div>
        <div><label class="field-lbl">טלפון</label><input id="profilePhone" class="field-inp" type="text" value="${soldier?.phone||''}"/></div>
        <div><label class="field-lbl">מספר אישי</label><input id="profileId" class="field-inp" type="text" value="${soldier?.id||''}"/></div>
      </div>
      <div class="border-t border-outline-variant/20 pt-4 space-y-3">
        <p class="font-label text-xs text-on-surface-variant uppercase tracking-wider flex items-center gap-1.5"><span class="material-symbols-outlined" style="font-size:14px">lock</span>פרטי התחברות</p>
        <div><label class="field-lbl">אימייל</label><input id="profileEmail" class="field-inp" type="email" value="${soldier?.email||currentUser?.email||''}"/></div>
        <div><label class="field-lbl">סיסמה חדשה</label><input id="profilePass" class="field-inp" type="password" placeholder="השאר ריק לאי-שינוי"/></div>
      </div>
      <p id="profileErr" class="text-xs text-error min-h-[16px]"></p>
    </div>`,
    '<button onclick="closeModal()" class="btn-cancel">ביטול</button><button onclick="window._saveProfile()" class="btn-save">שמור</button>');
  };

  window._saveProfile=async function(){
    const name=document.getElementById('profileName').value.trim();
    const phone=document.getElementById('profilePhone').value.trim();
    const pid=document.getElementById('profileId').value.trim();
    const email=document.getElementById('profileEmail').value.trim();
    const pass=document.getElementById('profilePass').value;
    const errEl=document.getElementById('profileErr');
    if(!name){if(errEl)errEl.textContent='נא למלא שם';return;}
    let photo=null;
    const pi=document.getElementById('profilePhotoInput');
    if(pi?.files[0]){photo=await new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(pi.files[0]);});}
    try {
      if(currentSoldierId){const upd={name,phone,id:pid};if(photo)upd.photo=photo;await update(ref(db,'soldiers/'+currentSoldierId),upd);}
      const userUpd={name};if(photo)userUpd.photo=photo;
      await update(ref(db,'users/'+currentUser.uid),userUpd);
      currentUser.name=name;
      const {updateEmail,updatePassword,getAuth}=await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
      const authUser=getAuth().currentUser;
      if(email&&authUser&&email!==authUser.email){
        try{await updateEmail(authUser,email);}catch(e){if(errEl)errEl.textContent='שגיאה בעדכון אימייל: '+e.message;return;}
        if(currentSoldierId) await update(ref(db,'soldiers/'+currentSoldierId),{email});
      }
      if(pass){try{await updatePassword(authUser,pass);}catch(e){if(errEl)errEl.textContent='שגיאה בסיסמה: '+e.message;return;}}
      const spn=document.getElementById('sideProfileName');if(spn)spn.textContent=name;
      if(photo){const spp=document.getElementById('sideProfilePhoto');if(spp)spp.innerHTML='<img src="'+photo+'" class="w-full h-full object-cover"/>';}
      closeModal();showToast('פרופיל עודכן ✓');
    }catch(e){if(errEl)errEl.textContent='שגיאה: '+e.message;}
  };

  // Modal & Toast
  function showModal(title,body,footer){
    document.getElementById('drawerTitle').textContent=title;
    document.getElementById('drawerBody').innerHTML=body;
    document.getElementById('drawerFooter').innerHTML=footer||'';
    document.getElementById('formDrawer').style.transform='translateX(0)';
    document.getElementById('formDrawerBackdrop').style.display='block';
  }
  window.closeModal=function(){
    document.getElementById('formDrawer').style.transform='translateX(-110%)';
    document.getElementById('formDrawerBackdrop').style.display='none';
  };
  function showToast(msg,isError=false){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.className=`fixed top-20 left-1/2 -translate-x-1/2 z-[200] px-5 py-3 rounded-sm font-label text-sm font-bold shadow-xl transition-all ${isError?'bg-error text-on-primary':'bg-primary text-on-primary'}`;
    t.classList.remove('opacity-0');
    setTimeout(()=>t.classList.add('opacity-0'),2500);
  }
</script>
